<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonant XP | Begin the conversation</title>
  <meta name="description" content="Start a conversation about designing an experience for your leadership team or organisation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Martel+Sans:wght@300;400;600;800&family=Linden+Hill:ital@0;1&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script src="header.js" defer></script>
  <script src="nav.js" defer></script>
  <style data-page-style>
    /* ===================================================
       CONTACT — CELTX STAGE PLAY FORMAT
       Left-flush character names · indented dialogue
       Courier New throughout · white page
       =================================================== */

    .celtx-env {
      background: #ffffff;
      min-height: 100vh;
      padding: calc(var(--header-h, 80px) + 3rem) 1rem 8rem;
    }

    /* ── Script page (content area with margins) ──────── */
    .celtx-paper {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      line-height: 1.5;
      color: #000000;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 48px;
    }

    /* ── ACT / SCENE headings — centered, underlined ──── */
    .celtx-act,
    .celtx-scene {
      display: block;
      text-align: center;
      text-decoration: underline;
      font-weight: normal;
      margin: 0 0 0.8em;
      font-size: 12pt;
    }

    /* ── Scene description — italic, indented ─────────── */
    .celtx-sd {
      display: block;
      font-style: italic;
      padding-left: 3em;
      padding-right: 3em;
      margin: 0 0 2.5em;
      color: #222;
    }

    /* ── Exchange block ───────────────────────────────── */
    .celtx-block { margin: 0; }

    /* ── Character name — LEFT FLUSH, all caps ────────── */
    .celtx-char {
      display: block;
      text-align: left;
      text-transform: uppercase;
      font-weight: normal;
      margin: 1.6em 0 0;
      font-size: 12pt;
      letter-spacing: 0;
    }

    /* CHORUS — plain Courier */
    .celtx-char-chorus { color: #000; }

    /* YOU — Averia Serif Libre italic, blue, clickable */
    .celtx-char-you {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      color: #2563eb;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
    }

    /* Name-entry hint beneath first YOU */
    .celtx-name-hint {
      display: block;
      font-family: 'Courier New', Courier, monospace;
      font-size: 9pt;
      font-style: italic;
      color: #94a3b8;
      margin: 0 0 0;
    }
    .celtx-name-hint.hidden { display: none; }

    /* Inline name input (replaces YOU text on click) */
    .celtx-name-inp {
      background: transparent;
      border: none;
      border-bottom: 1px solid #2563eb;
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      font-size: 12pt;
      color: #2563eb;
      outline: none;
      width: 14em;
      padding: 0;
      text-transform: uppercase;
    }
    .celtx-name-inp::placeholder {
      color: #93c5fd;
      text-transform: none;
    }

    /* ── Dialogue — indented one tab stop ─────────────── */
    .celtx-dial {
      display: block;
      padding-left: 3em;
      text-align: left;
      margin: 0;
      font-size: 12pt;
    }
    .celtx-dial-user {
      font-style: italic;
      color: #333;
    }

    /* ── Parenthetical ────────────────────────────────── */
    .celtx-paren {
      display: block;
      padding-left: 3em;
      font-style: italic;
      color: #555;
      font-size: 12pt;
      margin: 0;
    }

    /* ── Input field ──────────────────────────────────── */
    .celtx-input-col {
      display: block;
      padding-left: 3em;
      padding-right: 1em;
    }

    .celtx-input {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #555;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      color: #000;
      padding: 0 0 2px;
      outline: none;
      resize: none;
      line-height: 1.5;
      overflow-y: hidden;
    }
    .celtx-input:focus { border-bottom-color: #000; }

    /* ── Continue cue — right-aligned ────────────────── */
    .celtx-cue {
      display: block;
      text-align: right;
      margin-top: 5px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      font-size: 9pt;
      color: #aaa;
      padding: 0;
      width: 100%;
      transition: color 0.15s;
    }
    .celtx-cue:hover { color: #000; }

    /* ── Options — ripple in ──────────────────────────── */
    @keyframes rippleIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .celtx-options { padding-left: 3em; }

    .celtx-option {
      display: block;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      font-style: italic;
      color: #666;
      padding: 0;
      line-height: 1.6;
      opacity: 0;
      animation: rippleIn 0.3s ease forwards;
      transition: color 0.15s;
    }
    .celtx-option:hover { color: #000; }

    /* ── Send button ──────────────────────────────────── */
    .celtx-send-col {
      padding-left: 3em;
      margin-top: 1.5em;
    }

    /* ── History — faded ──────────────────────────────── */
    #scriptHistory .celtx-block { opacity: 0.38; }

    /* ── Foot note ────────────────────────────────────── */
    .celtx-foot {
      margin-top: 5em;
      font-size: 9pt;
      font-style: italic;
      color: #bbb;
      text-align: center;
    }
    .celtx-foot a { color: #bbb; text-decoration: underline; }

    @media (max-width: 560px) {
      .celtx-paper { padding: 0 20px; }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <main style="position: relative; z-index: 1;">
    <div class="celtx-env">
      <div class="celtx-paper">

        <span class="celtx-act">ACT I</span>
        <span class="celtx-scene">Scene 1</span>

        <span class="celtx-sd">An organisation in motion. Something is already under way. Whether it is named or not is still unclear.</span>

        <div id="scriptHistory"></div>
        <div id="scriptCurrent"></div>

        <p class="celtx-foot">(Or write directly: <a href="mailto:lab@resonantxp.com">lab@resonantxp.com</a>)</p>

      </div>
    </div>

    <script>
    (function () {
      const histEl = document.getElementById('scriptHistory');
      const currEl = document.getElementById('scriptCurrent');

      let userName    = null;
      let firstHintEl = null;  // "(click to enter your name)" hint
      let stepIdx     = 0;
      const formData  = {};

      const STEPS = [
        {
          name:   'situation',
          chorus: 'What is it?',
          paren:  '(You don\'t need to be precise. A direction is enough.)',
          type:   'textarea'
        },
        {
          name:   'email',
          chorus: 'And how do I reach you?',
          type:   'email'
        },
        {
          name:   'organisation',
          chorus: 'And your organisation?',
          type:   'text'
        },
        {
          name:   'role',
          chorus: 'What is your role there?',
          type:   'text'
        },
        {
          name:    'location',
          chorus:  'Where are you?',
          type:    'options',
          options: ['Belgium', 'Netherlands', 'Germany', 'Other']
        },
        {
          name:    'language',
          chorus:  'In which language?',
          type:    'options',
          options: ['English', 'Nederlands', 'Deutsch']
        }
      ];

      // ── Helpers ──────────────────────────────────────
      function userLabel() {
        return userName
          ? userName.split(' ')[0].toUpperCase()
          : 'YOU';
      }

      function syncAllYouLabels() {
        document.querySelectorAll('.js-you-label').forEach(el => {
          if (!el.querySelector('input')) {   // don't overwrite active input
            el.textContent = userLabel();
          }
        });
        if (firstHintEl) firstHintEl.classList.add('hidden');
      }

      // ── YOU label (name-editable) ─────────────────────
      function makeYouLabel(isFirst) {
        const labelEl = document.createElement('span');
        labelEl.className = 'celtx-char celtx-char-you js-you-label';
        labelEl.textContent = userLabel();

        labelEl.addEventListener('click', () => activateName(labelEl));

        const wrapper = document.createElement('div');
        wrapper.appendChild(labelEl);

        if (isFirst) {
          const hint = document.createElement('span');
          hint.className = 'celtx-name-hint' + (userName ? ' hidden' : '');
          hint.textContent = '(click to enter your name)';
          firstHintEl = hint;
          wrapper.appendChild(hint);
        }

        return wrapper;
      }

      function activateName(labelEl) {
        if (labelEl.querySelector('input')) return; // already active
        const prev = labelEl.textContent;

        const inp = document.createElement('input');
        inp.className  = 'celtx-name-inp';
        inp.type       = 'text';
        inp.placeholder = 'your name';

        labelEl.textContent = '';
        labelEl.appendChild(inp);
        inp.focus();

        const confirm = () => {
          const v = inp.value.trim();
          if (v) {
            userName = v;
            formData['name'] = v;
          }
          labelEl.textContent = userLabel();
          syncAllYouLabels();
        };

        inp.addEventListener('blur', confirm);
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
          if (e.key === 'Escape') { labelEl.textContent = prev; }
        });
      }

      // ── Chorus block ─────────────────────────────────
      function makeChorusBlock(step) {
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block celtx-chorus';

        const name = document.createElement('span');
        name.className = 'celtx-char celtx-char-chorus';
        name.textContent = 'CHORUS';
        wrap.appendChild(name);

        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = step.chorus;
        wrap.appendChild(dial);

        if (step.paren) {
          const par = document.createElement('span');
          par.className = 'celtx-paren';
          par.textContent = step.paren;
          wrap.appendChild(par);
        }

        return wrap;
      }

      // ── User input block ──────────────────────────────
      function makeUserBlock(step, isFirst) {
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block celtx-user-input';

        wrap.appendChild(makeYouLabel(isFirst));

        if (step.type === 'textarea') {
          const col = document.createElement('div');
          col.className = 'celtx-input-col';

          const ta = document.createElement('textarea');
          ta.className = 'celtx-input';
          ta.rows = 1;
          col.appendChild(ta);

          ta.addEventListener('input', () => {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
          });

          const cue = document.createElement('button');
          cue.className = 'celtx-cue';
          cue.type = 'button';
          cue.textContent = 'continue >';
          col.appendChild(cue);

          wrap.appendChild(col);

          const commit = () => { const v = ta.value.trim(); if (v) doCommit(step, v); };
          cue.addEventListener('click', commit);
          ta.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
          });
          setTimeout(() => ta.focus(), 80);

        } else if (step.type === 'text' || step.type === 'email') {
          const col = document.createElement('div');
          col.className = 'celtx-input-col';

          const inp = document.createElement('input');
          inp.type      = step.type;
          inp.className = 'celtx-input';
          col.appendChild(inp);

          const cue = document.createElement('button');
          cue.className = 'celtx-cue';
          cue.type = 'button';
          cue.textContent = 'continue >';
          col.appendChild(cue);

          wrap.appendChild(col);

          const commit = () => {
            const v = inp.value.trim();
            if (!v) return;
            if (step.type === 'email' && !v.includes('@')) { inp.focus(); return; }
            doCommit(step, v);
          };
          cue.addEventListener('click', commit);
          inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); commit(); }
          });
          setTimeout(() => inp.focus(), 80);

        } else if (step.type === 'options') {
          const opts = document.createElement('div');
          opts.className = 'celtx-options';
          step.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'celtx-option';
            btn.type = 'button';
            btn.textContent = opt;
            btn.style.animationDelay = (i * 90) + 'ms';
            btn.addEventListener('click', () => doCommit(step, opt));
            opts.appendChild(btn);
          });
          wrap.appendChild(opts);
        }

        return wrap;
      }

      // ── Commit ────────────────────────────────────────
      function doCommit(step, value) {
        formData[step.name] = value;

        const chorusEl = currEl.querySelector('.celtx-chorus');
        if (chorusEl) histEl.appendChild(chorusEl);

        // Completed user response
        const done = document.createElement('div');
        done.className = 'celtx-block';

        const doneName = document.createElement('span');
        doneName.className = 'celtx-char celtx-char-you js-you-label';
        doneName.textContent = userLabel();
        doneName.style.cursor = 'pointer';
        doneName.addEventListener('click', () => activateName(doneName));

        const doneDial = document.createElement('span');
        doneDial.className = 'celtx-dial celtx-dial-user';
        doneDial.textContent = value;

        done.appendChild(doneName);
        done.appendChild(doneDial);
        histEl.appendChild(done);

        currEl.innerHTML = '';
        stepIdx++;

        if (stepIdx < STEPS.length) showStep();
        else showSubmit();
      }

      // ── Show next step ─────────────────────────────────
      function showStep() {
        const step   = STEPS[stepIdx];
        const isFirst = stepIdx === 0;

        const cb = makeChorusBlock(step);
        cb.style.opacity    = '0';
        cb.style.transition = 'opacity 0.4s ease';
        currEl.appendChild(cb);
        setTimeout(() => { cb.style.opacity = '1'; }, 150);

        setTimeout(() => {
          const ub = makeUserBlock(step, isFirst);
          ub.style.opacity    = '0';
          ub.style.transition = 'opacity 0.4s ease';
          currEl.appendChild(ub);
          requestAnimationFrame(() => requestAnimationFrame(() => {
            ub.style.opacity = '1';
          }));
        }, 520);
      }

      // ── Submit step ────────────────────────────────────
      function showSubmit() {
        const block = document.createElement('div');
        block.className = 'celtx-block';

        const name = document.createElement('span');
        name.className = 'celtx-char celtx-char-chorus';
        name.textContent = 'CHORUS';

        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = 'Something will happen next.';

        const par = document.createElement('span');
        par.className = 'celtx-paren';
        par.textContent = '(Your details are used only to respond to your message.)';

        block.appendChild(name);
        block.appendChild(dial);
        block.appendChild(par);
        block.style.opacity    = '0';
        block.style.transition = 'opacity 0.4s ease';
        currEl.appendChild(block);
        setTimeout(() => { block.style.opacity = '1'; }, 150);

        setTimeout(() => {
          const col = document.createElement('div');
          col.className = 'celtx-send-col';

          const btn = document.createElement('button');
          btn.className = 'button button-primary';
          btn.type = 'button';
          btn.textContent = 'Send.';
          col.appendChild(btn);

          col.style.opacity    = '0';
          col.style.transition = 'opacity 0.4s ease';
          currEl.appendChild(col);
          requestAnimationFrame(() => requestAnimationFrame(() => {
            col.style.opacity = '1';
          }));

          btn.addEventListener('click', () => submitForm(btn));
        }, 520);
      }

      // ── Formspree ─────────────────────────────────────
      async function submitForm(btn) {
        btn.disabled    = true;
        btn.textContent = 'Sending…';

        const fd = new FormData();
        Object.entries(formData).forEach(([k, v]) => fd.append(k, v));
        fd.append('_subject', 'New conversation — Resonant XP');

        try {
          const res = await fetch('https://formspree.io/f/xdaynqov', {
            method: 'POST', body: fd,
            headers: { Accept: 'application/json' }
          });

          if (res.ok) {
            currEl.innerHTML = '';
            const fin = document.createElement('span');
            fin.className   = 'celtx-sd';
            fin.style.marginTop = '2em';
            fin.textContent = '(End of scene one.)';
            fin.style.opacity    = '0';
            fin.style.transition = 'opacity 0.5s ease';
            currEl.appendChild(fin);
            setTimeout(() => { fin.style.opacity = '1'; }, 100);
          } else {
            btn.disabled    = false;
            btn.textContent = 'Try again.';
          }
        } catch {
          btn.disabled    = false;
          btn.textContent = 'Try again.';
        }
      }

      // ── Header height ─────────────────────────────────
      const headerEl = document.getElementById('site-header');
      if (headerEl) {
        const setH = () =>
          document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
        setH();
        new ResizeObserver(setH).observe(headerEl);
      }

      // ── Init ──────────────────────────────────────────
      showStep();
    })();
    </script>

  </main>

</body>
</html>
