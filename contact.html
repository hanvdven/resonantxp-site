<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonant XP | Begin the conversation</title>
  <meta name="description" content="Start a conversation about designing an experience for your leadership team or organisation. Belgium, Netherlands and Germany." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Linden+Hill:ital@0;1&family=Martel+Sans:wght@300;400;600;800&family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script src="header.js" defer></script>
  <script src="nav.js" defer></script>
  <style>
    /* ===================================================
       CONTACT — THEATRE SCRIPT
       =================================================== */

    .script-stage {
      max-width: 560px;
      margin: 0 auto;
      padding: calc(var(--header-h, 80px) + 3.5rem) 2rem 8rem;
    }

    /* ── Stage directions ──────────────────────────── */
    .script-direction {
      font-family: 'Martel Sans', system-ui, sans-serif;
      font-size: 0.8rem;
      font-style: italic;
      color: #94a3b8;
      margin: 0 0 0.5rem;
      letter-spacing: 0.01em;
    }

    /* ── Script block (one exchange) ───────────────── */
    .script-block {
      margin-bottom: 2.2rem;
    }

    /* ── Character names ───────────────────────────── */
    .script-char {
      font-family: 'Martel Sans', system-ui, sans-serif;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      margin: 0 0 0.2rem;
    }
    .script-char-chorus { color: #1e293b; }
    .script-char-user   { color: #94a3b8; }

    /* ── Dialogue lines ────────────────────────────── */
    .script-line {
      margin: 0;
      padding-left: 2rem;
    }
    .script-line-chorus {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.05rem, 2.1vw, 1.45rem);
      font-style: italic;
      color: #1e293b;
      line-height: 1.35;
    }
    .script-line-user {
      font-family: 'Martel Sans', system-ui, sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: #64748b;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    /* ── User input area ───────────────────────────── */
    .script-input-area {
      padding-left: 2rem;
      margin-top: 0.1rem;
    }

    .script-input {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #e2e8f0;
      font-family: 'Martel Sans', system-ui, sans-serif;
      font-weight: 300;
      font-size: 0.9rem;
      color: #1e293b;
      padding: 0.15rem 0 0.35rem;
      outline: none;
      resize: none;
      line-height: 1.65;
      transition: border-bottom-color 0.2s;
    }
    .script-input:focus {
      border-bottom-color: #94a3b8;
    }
    .script-textarea {
      overflow-y: hidden;
      min-height: 1.8em;
    }

    /* ── Continue cue ──────────────────────────────── */
    .script-cue {
      display: inline-block;
      margin-top: 0.6rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Martel Sans', system-ui, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #cbd5e1;
      padding: 0;
      transition: color 0.2s;
    }
    .script-cue:hover { color: #475569; }

    /* ── Option buttons (ripple in) ────────────────── */
    @keyframes rippleIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .script-options {
      padding-left: 2rem;
      margin-top: 0.1rem;
    }

    .script-option {
      display: block;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 1rem;
      color: #94a3b8;
      padding: 0.2rem 0;
      opacity: 0;
      animation: rippleIn 0.35s ease forwards;
      transition: color 0.2s;
    }
    .script-option:hover { color: #1e293b; }

    /* ── Send button wrap ──────────────────────────── */
    .script-send-wrap {
      padding-left: 2rem;
      margin-top: 1.8rem;
    }

    /* ── History — faded ───────────────────────────── */
    #scriptHistory .script-block {
      opacity: 0.5;
    }

    /* ── Fallback ──────────────────────────────────── */
    .script-fallback {
      margin-top: 5rem;
      font-family: 'Martel Sans', system-ui, sans-serif;
      font-size: 0.78rem;
      font-style: italic;
      color: #94a3b8;
    }
    .script-fallback a {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    @media (max-width: 480px) {
      .script-stage {
        padding-left: 1.2rem;
        padding-right: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <main style="position: relative; z-index: 1;">
    <div class="script-stage">

      <p class="script-direction">[An organisation in motion.]</p>

      <div id="scriptHistory"></div>
      <div id="scriptCurrent"></div>

      <p class="script-fallback">[Or write directly: <a href="mailto:lab@resonantxp.com">lab@resonantxp.com</a>]</p>

    </div>
  </main>

  <script>
  (function () {
    const histEl = document.getElementById('scriptHistory');
    const currEl = document.getElementById('scriptCurrent');

    let userName = null;
    let stepIdx  = 0;
    const formData = {};

    const STEPS = [
      {
        name:      'situation',
        chorus:    'What is it?',
        direction: '[You don\'t need to be precise. A direction is enough.]',
        type:      'textarea'
      },
      {
        name:   'name',
        chorus: 'Who are you?',
        type:   'text',
        isName: true
      },
      {
        name:   'email',
        chorus: 'And how do I reach you?',
        type:   'email'
      },
      {
        name:    'location',
        chorus:  'Where are you?',
        type:    'options',
        options: ['Belgium', 'Netherlands', 'Germany', 'Other']
      },
      {
        name:    'language',
        chorus:  'In which language?',
        type:    'options',
        options: ['English', 'Nederlands', 'Deutsch']
      }
    ];

    // ── Helpers ──────────────────────────────────────────
    function userLabel() {
      return userName ? userName.split(' ')[0].toUpperCase() : '[NAAM]';
    }

    function updateNames() {
      document.querySelectorAll('.js-user-name').forEach(el => {
        el.textContent = userLabel();
      });
    }

    // ── Build blocks ─────────────────────────────────────
    function makeChorusBlock(step) {
      const wrap = document.createElement('div');
      wrap.className = 'script-block script-chorus';

      const char = document.createElement('p');
      char.className = 'script-char script-char-chorus';
      char.textContent = 'CHORUS';

      const line = document.createElement('p');
      line.className = 'script-line script-line-chorus';
      line.textContent = step.chorus;

      wrap.appendChild(char);
      wrap.appendChild(line);

      if (step.direction) {
        const dir = document.createElement('p');
        dir.className = 'script-direction';
        dir.textContent = step.direction;
        wrap.appendChild(dir);
      }

      return wrap;
    }

    function makeUserInputBlock(step) {
      const wrap = document.createElement('div');
      wrap.className = 'script-block script-user-input';

      const char = document.createElement('p');
      char.className = 'script-char script-char-user js-user-name';
      char.textContent = userLabel();
      wrap.appendChild(char);

      const area = document.createElement('div');
      area.className = 'script-input-area';
      wrap.appendChild(area);

      if (step.type === 'textarea') {
        const ta = document.createElement('textarea');
        ta.className = 'script-input script-textarea';
        ta.rows = 1;
        ta.required = true;
        area.appendChild(ta);

        // Auto-resize
        ta.addEventListener('input', () => {
          ta.style.height = 'auto';
          ta.style.height = ta.scrollHeight + 'px';
        });

        const cue = document.createElement('button');
        cue.className = 'script-cue';
        cue.type = 'button';
        cue.textContent = 'continue →';
        area.appendChild(cue);

        const commit = () => {
          const val = ta.value.trim();
          if (val) doCommit(step, val);
        };
        cue.addEventListener('click', commit);
        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        });

        setTimeout(() => ta.focus(), 80);

      } else if (step.type === 'text' || step.type === 'email') {
        const inp = document.createElement('input');
        inp.type  = step.type;
        inp.className = 'script-input';
        inp.required  = true;
        area.appendChild(inp);

        const cue = document.createElement('button');
        cue.className = 'script-cue';
        cue.type = 'button';
        cue.textContent = 'continue →';
        area.appendChild(cue);

        const commit = () => {
          const val = inp.value.trim();
          if (!val) return;
          if (step.type === 'email' && !val.includes('@')) { inp.focus(); return; }
          doCommit(step, val);
        };
        cue.addEventListener('click', commit);
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
        });

        setTimeout(() => inp.focus(), 80);

      } else if (step.type === 'options') {
        const opts = document.createElement('div');
        opts.className = 'script-options';

        step.options.forEach((opt, i) => {
          const btn = document.createElement('button');
          btn.className = 'script-option';
          btn.type = 'button';
          btn.textContent = opt;
          btn.style.animationDelay = (i * 90) + 'ms';
          btn.addEventListener('click', () => doCommit(step, opt));
          opts.appendChild(btn);
        });

        area.appendChild(opts);
      }

      return wrap;
    }

    // ── Commit a step ─────────────────────────────────────
    function doCommit(step, value) {
      formData[step.name] = value;

      if (step.isName) {
        userName = value;
        updateNames(); // retroactively update all [NAAM] labels in DOM
      }

      // Move chorus block to history
      const chorusEl = currEl.querySelector('.script-chorus');
      if (chorusEl) histEl.appendChild(chorusEl);

      // Add completed user response to history
      const doneUser = document.createElement('div');
      doneUser.className = 'script-block';

      const doneChar = document.createElement('p');
      doneChar.className = 'script-char script-char-user js-user-name';
      doneChar.textContent = userLabel();

      const doneLine = document.createElement('p');
      doneLine.className = 'script-line script-line-user';
      doneLine.textContent = value;

      doneUser.appendChild(doneChar);
      doneUser.appendChild(doneLine);
      histEl.appendChild(doneUser);

      // Clear current
      currEl.innerHTML = '';

      stepIdx++;
      if (stepIdx < STEPS.length) {
        showStep();
      } else {
        showSubmit();
      }
    }

    // ── Show next step ─────────────────────────────────────
    function showStep() {
      const step = STEPS[stepIdx];

      // Chorus block fades in
      const cb = makeChorusBlock(step);
      cb.style.opacity   = '0';
      cb.style.transition = 'opacity 0.4s ease';
      currEl.appendChild(cb);
      setTimeout(() => { cb.style.opacity = '1'; }, 150);

      // User input block appears slightly after
      setTimeout(() => {
        const ib = makeUserInputBlock(step);
        ib.style.opacity   = '0';
        ib.style.transition = 'opacity 0.4s ease';
        currEl.appendChild(ib);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          ib.style.opacity = '1';
        }));
      }, 520);
    }

    // ── Submit step ────────────────────────────────────────
    function showSubmit() {
      const block = document.createElement('div');
      block.className = 'script-block';

      const char = document.createElement('p');
      char.className = 'script-char script-char-chorus';
      char.textContent = 'CHORUS';

      const line = document.createElement('p');
      line.className = 'script-line script-line-chorus';
      line.textContent = 'Something will happen next.';

      const dir = document.createElement('p');
      dir.className = 'script-direction';
      dir.textContent = '[Your details are used only to respond to your message.]';

      block.appendChild(char);
      block.appendChild(line);
      block.appendChild(dir);
      block.style.opacity   = '0';
      block.style.transition = 'opacity 0.4s ease';
      currEl.appendChild(block);
      setTimeout(() => { block.style.opacity = '1'; }, 150);

      setTimeout(() => {
        const sendWrap = document.createElement('div');
        sendWrap.className = 'script-send-wrap';

        const sendBtn = document.createElement('button');
        sendBtn.className = 'button button-primary';
        sendBtn.type = 'button';
        sendBtn.textContent = 'Send.';
        sendWrap.appendChild(sendBtn);

        sendWrap.style.opacity   = '0';
        sendWrap.style.transition = 'opacity 0.4s ease';
        currEl.appendChild(sendWrap);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          sendWrap.style.opacity = '1';
        }));

        sendBtn.addEventListener('click', () => submitForm(sendBtn));
      }, 520);
    }

    // ── Submit to Formspree ────────────────────────────────
    async function submitForm(btn) {
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const fd = new FormData();
      Object.entries(formData).forEach(([k, v]) => fd.append(k, v));
      fd.append('_subject', 'New conversation — Resonant XP');

      try {
        const res = await fetch('https://formspree.io/f/xdaynqov', {
          method: 'POST',
          body: fd,
          headers: { Accept: 'application/json' }
        });

        if (res.ok) {
          currEl.innerHTML = '';
          const closing = document.createElement('p');
          closing.className = 'script-direction';
          closing.textContent = '[End of scene one.]';
          closing.style.opacity   = '0';
          closing.style.transition = 'opacity 0.5s ease';
          currEl.appendChild(closing);
          setTimeout(() => { closing.style.opacity = '1'; }, 100);
        } else {
          btn.disabled = false;
          btn.textContent = 'Try again.';
        }
      } catch {
        btn.disabled = false;
        btn.textContent = 'Try again.';
      }
    }

    // ── Header height → --header-h ────────────────────────
    const headerEl = document.getElementById('site-header');
    if (headerEl) {
      const setH = () =>
        document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
      setH();
      new ResizeObserver(setH).observe(headerEl);
    }

    // ── Init ──────────────────────────────────────────────
    showStep();
  })();
  </script>

</body>
</html>
