  <style data-page-style>
    /* ===================================================
       CONTACT — CELTX STAGE PLAY FORMAT
       =================================================== */

    .celtx-env {
      background: #ffffff;
      min-height: 100vh;
      padding: 0 1rem 8rem;
      transition: background-color 1.5s ease;
    }

    .celtx-paper {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      line-height: 1.5;
      color: #000000;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 48px;
    }

    #scriptHistory { overflow-y: visible; padding-bottom: 0; }

    .celtx-act, .celtx-scene {
      display: block;
      text-align: center;
      text-decoration: underline;
      font-weight: normal;
      margin: 0 0 0.8em;
      font-size: 12pt;
    }

    .celtx-sd {
      display: block;
      font-style: italic;
      padding-left: 3em;
      padding-right: 3em;
      margin: 0 0 2.5em;
      color: #222;
    }

    .celtx-block { margin: 0; }

    /* ── Character names ──────────────────────────── */
    .celtx-char {
      display: block;
      text-align: left;
      text-transform: uppercase;
      font-weight: normal;
      margin: 1.6em 0 0;
      font-size: 12pt;
    }

    .celtx-char-resona { color: #000; }

    /* YOU label — blue italic, no click interaction */
    .celtx-char-you-static {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      color: #2563eb;
      text-transform: none;
    }

    /* ── Dialogue ─────────────────────────────────── */
    .celtx-dial {
      display: block;
      padding-left: 3em;
      text-align: left;
      margin: 0;
      font-size: 12pt;
    }

    /* User lines — container only; colour/font live on the mark elements */
    .celtx-dial-user {}

    /* Committed user lines in history */
    #scriptHistory .celtx-dial-user { opacity: 1; }

    /* Fluorescent marker — scripted text: black Courier */
    mark.celtx-marker {
      background: none;
      background-color: rgba(255, 253, 0, 0.55);
      color: inherit;
      font: inherit;
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
      padding: 0.07em 0.3em 0.1em 0.2em;
      border-radius: 0;
      filter: url(#marker-roughness);
    }

    /* Ink marker — typed input: blue Averia italic */
    mark.celtx-marker-ink {
      color: #2563eb;
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
    }

    /* Editable committed lines — dotted underline, click to re-edit */
    .celtx-dial-user[data-editable] {
      cursor: pointer;
      text-decoration: underline dotted rgba(37,99,235,0.4);
      text-underline-offset: 3px;
    }
    .celtx-dial-user[data-editable]:hover {
      text-decoration-color: rgba(37,99,235,0.75);
    }

    /* Committed name blended into sentence — no click affordance */
    .celtx-name-committed {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      color: #2563eb;
    }

    /* ── Inky inline inputs ───────────────────────── */
    .celtx-ink {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      font-size: 12pt;
      color: #2563eb;
      background: transparent;
      border: none;
      outline: none;
      padding: 0 0.1em;
      vertical-align: baseline;
      line-height: 1.5;
    }
    .celtx-ink::placeholder {
      color: #93c5fd;
      letter-spacing: 0.28em;
    }

    /* Block inputs — name and email primary fields */
    input.celtx-ink {
      display: block;
      width: 100%;
      box-sizing: border-box;
      border-bottom: 1px dotted rgba(37,99,235,0.35);
    }
    /* Inline inputs — used only in edit-in-place (makeEditableLine) */
    input.celtx-ink.celtx-ink-inline {
      display: inline;
      width: auto;
    }

    textarea.celtx-ink {
      display: block;
      width: 100%;
      resize: none;
      overflow-y: hidden;
      border-bottom: 1px dotted rgba(37,99,235,0.3);
      padding-left: 3em;
      margin-top: 0.3em;
      box-sizing: border-box;
    }

    /* ── Label above input ────────────────────────── */
    .celtx-ink-wrap {
      padding-left: 3em;
      margin-top: 0.3em;
    }

    .celtx-ink-hint {
      display: block;
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      font-size: 0.82em;
      color: #93c5fd;
      transition: opacity 0.2s;
      margin-bottom: 0.1em;
    }

    /* ── Inline location options ──────────────────── */
    @keyframes rippleIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .loc-option {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      color: #2563eb;
      cursor: pointer;
      border-bottom: 1px dotted rgba(37,99,235,0.45);
      margin: 0 0.35em;
      display: inline;
      transition: color 0.15s;
    }
    .loc-option:hover { color: #1d4ed8; }

    .loc-editable {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      color: #2563eb;
      cursor: pointer;
      text-decoration: underline dotted rgba(37,99,235,0.45);
      text-underline-offset: 3px;
      display: inline;
    }
    .loc-editable:hover { text-decoration-color: rgba(37,99,235,0.75); }

    /* ── Options block (intent) ───────────────────── */
    .celtx-options { padding-left: 3em; }

    .celtx-option {
      display: block;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      font-style: italic;
      color: #2563eb;
      padding: 0;
      line-height: 1.6;
      opacity: 0;
      animation: rippleIn 0.3s ease forwards;
      transition: color 0.15s;
    }
    .celtx-option:hover { color: #1d4ed8; }

    /* ── Send button ─────────────────────────────── */
    .celtx-send-col {
      padding-left: 3em;
      margin-top: 1.5em;
    }

    /* ── History ──────────────────────────────────── */
    #scriptHistory .celtx-block { opacity: 1; }

    /* ── Foot note ───────────────────────────────── */
    .celtx-foot {
      margin-top: 5em;
      font-size: 9pt;
      font-style: italic;
      color: #bbb;
      text-align: center;
      transition: opacity 0.5s ease;
    }
    .celtx-foot a { color: #bbb; text-decoration: underline; }

    @media (max-width: 560px) {
      .celtx-paper { padding: 0 20px; }
    }
  </style>
</head>

<body class="contact-page">
  <div id="site-header"></div>

  <!-- Marker roughness filter -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="marker-roughness" x="-6%" y="-55%" width="112%" height="210%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.025 0.075" numOctaves="3" seed="4" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <main style="position: relative; z-index: 1;">
    <div class="celtx-env" id="celtxEnv">
      <div class="celtx-paper">

        <span class="celtx-act">ACT I</span>
        <span class="celtx-scene">Scene 1</span>
        <span class="celtx-sd" id="celtxTimeSD"></span>

        <div id="scriptHistory"></div>
        <div id="scriptCurrent"></div>

        <p class="celtx-foot" id="celtxFoot">(Or write directly: <a href="mailto:han@resonantxp.com">han@resonantxp.com</a>)</p>

      </div>
    </div>

    <script>
    (function () {
      'use strict';

      const histEl = document.getElementById('scriptHistory');
      const currEl = document.getElementById('scriptCurrent');
      const envEl  = document.getElementById('celtxEnv');
      const footEl = document.getElementById('celtxFoot');

      let userName     = null;
      const formData   = {};
      let introResumed = false;

      // ── Dynamic time stage direction ─────────────────
      (function () {
        const now  = new Date();
        const hhmm = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        const hour = now.getHours();
        let detail;
        if      (hour >= 22 || hour < 5) detail = `It is late. A clock reads ${hhmm}. Someone is still here.`;
        else if (hour < 9)               detail = `Early. A clock reads ${hhmm}. The day has not decided what it wants to be.`;
        else if (hour < 12)              detail = `Morning. A clock reads ${hhmm}. The coffee is still warm.`;
        else if (hour < 14)              detail = `Just after noon. A clock reads ${hhmm}. The sandwich is getting cold.`;
        else if (hour < 17)              detail = `Afternoon. A clock reads ${hhmm}. The meeting that could have been an email has just ended.`;
        else if (hour < 20)              detail = `Early evening. A clock reads ${hhmm}. The office is thinning out.`;
        else                             detail = `Evening. A clock reads ${hhmm}. Someone is still at their desk.`;
        const el = document.getElementById('celtxTimeSD');
        if (el) el.textContent = detail;
      })();

      // ── Header height ─────────────────────────────────
      const headerEl = document.getElementById('site-header');
      if (headerEl) {
        const setH = () =>
          document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
        setH();
        new ResizeObserver(setH).observe(headerEl);
      }

      // ── Helpers ───────────────────────────────────────
      function userLabel() {
        return userName ? userName.split(' ')[0].toUpperCase() : 'YOU';
      }

      function updateAllNameLabels() {
        document.querySelectorAll('[data-you-label]').forEach(el => {
          el.textContent = userLabel();
        });
      }

      function makeYouCharEl() {
        const el = document.createElement('span');
        el.className = 'celtx-char celtx-char-you-static';
        el.setAttribute('data-you-label', '');
        el.textContent = userLabel();
        return el;
      }

      function makePersonaBlock(text) {
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';
        const name = document.createElement('span');
        name.className = 'celtx-char celtx-char-resona';
        name.textContent = 'PERSONA';
        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = text;
        wrap.appendChild(name);
        wrap.appendChild(dial);
        return wrap;
      }

      const makeResonaBlock = makePersonaBlock;

      function makeMarked(text, ink) {
        const m = document.createElement('mark');
        m.className = ink ? 'celtx-marker celtx-marker-ink' : 'celtx-marker';
        m.textContent = text;
        return m;
      }

      // Committed editable line — click to re-edit inline
      function makeEditableLine(initialText, fieldName, prefix, onChange) {
        const wrap = document.createElement('span');
        wrap.className = 'celtx-dial celtx-dial-user';
        wrap.setAttribute('data-editable', fieldName);

        function setDisplay(value) {
          wrap.innerHTML = '';
          if (prefix) wrap.appendChild(makeMarked(prefix.trimEnd(), false));
          if (prefix) wrap.appendChild(document.createTextNode(' '));
          wrap.appendChild(makeMarked(value, true));
        }
        setDisplay(initialText);

        wrap.addEventListener('click', () => {
          if (wrap.querySelector('input')) return;
          const current = formData[fieldName] || initialText;
          const inp = document.createElement('input');
          inp.type = fieldName === 'email' ? 'email' : 'text';
          inp.className = 'celtx-ink celtx-ink-inline';
          inp.value = current;
          inp.style.width = fieldName === 'email' ? '14em' : '20em';
          wrap.innerHTML = '';
          if (prefix) wrap.appendChild(document.createTextNode(prefix));
          wrap.appendChild(inp);
          inp.focus();
          inp.select();
          let done2 = false;
          const doCommit = () => {
            if (done2) return;
            done2 = true;
            const v = inp.value.trim() || current;
            formData[fieldName] = v;
            if (onChange) onChange(v);
            setDisplay(v);
          };
          inp.addEventListener('blur', doCommit);
          inp.addEventListener('keydown', e => {
            if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
            if (e.key === 'Escape') { done2 = true; setDisplay(current); }
          });
        });
        return wrap;
      }

      function fadeIn(el, delayMs) {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.45s ease';
        setTimeout(() => requestAnimationFrame(() => requestAnimationFrame(() => {
          el.style.opacity = '1';
        })), delayMs || 0);
      }

      function scrollToBottom() {
        setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 120);
      }

      // ── Intro: PERSONA opener with name input below ──
      (function () {
        const r1wrap = document.createElement('div');
        r1wrap.className = 'celtx-block';
        r1wrap.style.opacity = '0';
        r1wrap.style.transition = 'opacity 0.45s ease';

        const r1char = document.createElement('span');
        r1char.className = 'celtx-char celtx-char-resona';
        r1char.textContent = 'PERSONA';

        // Dialogue line ends with comma — name appears below
        const r1dial = document.createElement('span');
        r1dial.className = 'celtx-dial';
        r1dial.appendChild(document.createTextNode('Something is different about you,'));

        // Label above the input line
        const inkWrap = document.createElement('div');
        inkWrap.className = 'celtx-ink-wrap';

        const nameHint = document.createElement('span');
        nameHint.className = 'celtx-ink-hint';
        nameHint.textContent = 'your name';

        const nameInp = document.createElement('input');
        nameInp.type = 'text';
        nameInp.className = 'celtx-ink';
        nameInp.setAttribute('autocomplete', 'name');

        inkWrap.appendChild(nameHint);
        inkWrap.appendChild(nameInp);
        r1wrap.appendChild(r1char);
        r1wrap.appendChild(r1dial);
        r1wrap.appendChild(inkWrap);
        histEl.appendChild(r1wrap);

        setTimeout(() => requestAnimationFrame(() => requestAnimationFrame(() => {
          r1wrap.style.opacity = '1';
          setTimeout(() => nameInp.focus(), 200);
        })), 300);

        let idleTimer = null;

        function commitName() {
          if (introResumed) return;
          introResumed = true;
          const v = nameInp.value.trim();
          if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
          if (v) { userName = v; formData['name'] = v; }

          // Remove the input block, append name seamlessly to the sentence
          r1wrap.removeChild(inkWrap);
          r1dial.appendChild(document.createTextNode(' '));
          const nameSpan = document.createElement('span');
          nameSpan.className = 'celtx-name-committed';
          nameSpan.textContent = userName || '—';
          r1dial.appendChild(nameSpan);

          updateAllNameLabels();

          const youBlock = document.createElement('div');
          youBlock.className = 'celtx-block';
          youBlock.appendChild(makeYouCharEl());
          const feelLine = document.createElement('span');
          feelLine.className = 'celtx-dial celtx-dial-user';
          feelLine.appendChild(makeMarked('Yes. I have had a feeling for a while now.'));
          youBlock.appendChild(feelLine);
          fadeIn(youBlock, 0);
          histEl.appendChild(youBlock);
          scrollToBottom();
          continueAfterName();
        }

        nameInp.addEventListener('input', () => {
          nameHint.style.opacity = nameInp.value.length ? '0' : '1';
          if (idleTimer) clearTimeout(idleTimer);
          if (nameInp.value.trim()) idleTimer = setTimeout(commitName, 3000);
        });
        nameInp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); commitName(); }
        });
        nameInp.addEventListener('blur', () => {
          if (nameInp.value.trim() && !introResumed) commitName();
        });
      })();

      function continueAfterName() {
        const r2 = makeResonaBlock('As if you cannot just sit still? That small reflex — like a twitch in your leg. I have it sometimes. My body tells me it is time to move. And yet... I don\'t.');
        fadeIn(r2, 300);
        histEl.appendChild(r2);
        scrollToBottom();
        setTimeout(showSituationStep, 2200);
      }

      // ── STEP 1: Situation ─────────────────────────────
      function showSituationStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        wrap.appendChild(makeYouCharEl());

        const prelude = document.createElement('span');
        prelude.className = 'celtx-dial celtx-dial-user';
        prelude.appendChild(makeMarked('Hmm. Let me be a bit more specific.'));
        wrap.appendChild(prelude);

        const ta = document.createElement('textarea');
        ta.className = 'celtx-ink';
        ta.rows = 1;
        ta.placeholder = '...';
        wrap.appendChild(ta);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        setTimeout(() => ta.focus(), 300);
        scrollToBottom();

        let idleTimer = null;
        let committed = false;

        const commit = () => {
          if (committed) return;
          const v = ta.value.trim();
          if (!v) return;
          committed = true;
          if (idleTimer) clearTimeout(idleTimer);
          formData['situation'] = v;

          const done = document.createElement('div');
          done.className = 'celtx-block';
          done.appendChild(makeYouCharEl());
          const dp = document.createElement('span');
          dp.className = 'celtx-dial celtx-dial-user';
          dp.appendChild(makeMarked('Hmm. Let me be a bit more specific.'));
          done.appendChild(dp);
          done.appendChild(makeEditableLine(v, 'situation', ''));
          histEl.appendChild(done);

          currEl.innerHTML = '';
          showLocationStep();
        };

        ta.addEventListener('input', () => {
          ta.style.height = 'auto';
          ta.style.height = ta.scrollHeight + 'px';
          if (idleTimer) clearTimeout(idleTimer);
          if (ta.value.trim()) idleTimer = setTimeout(commit, 3000);
        });
        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        });
        ta.addEventListener('blur', () => { if (ta.value.trim()) commit(); });
      }

      // ── STEP 2: Location ──────────────────────────────
      function buildCountryDial(dialEl, selectedLoc) {
        while (dialEl.firstChild) dialEl.removeChild(dialEl.firstChild);
        dialEl.appendChild(document.createTextNode('I see. Good fortune you operate in '));
        const locSpan = document.createElement('span');
        locSpan.className = 'loc-editable';
        locSpan.textContent = selectedLoc;
        locSpan.addEventListener('click', () => {
          while (dialEl.firstChild) dialEl.removeChild(dialEl.firstChild);
          dialEl.appendChild(document.createTextNode('I see. Good fortune you operate in '));
          ['Belgium', 'Netherlands', 'Germany', 'Other'].forEach((l, i) => {
            const opt = document.createElement('span');
            opt.className = 'loc-option';
            opt.textContent = `[${l}]`;
            opt.style.opacity = '0';
            opt.style.animation = `rippleIn 0.3s ease ${i * 90}ms forwards`;
            opt.addEventListener('click', () => {
              formData['location'] = l;
              buildCountryDial(dialEl, l);
            });
            dialEl.appendChild(opt);
            if (i < 3) dialEl.appendChild(document.createTextNode(' '));
          });
        });
        dialEl.appendChild(locSpan);
        dialEl.appendChild(document.createTextNode('.'));
      }

      function showLocationStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        const nameEl = document.createElement('span');
        nameEl.className = 'celtx-char celtx-char-resona';
        nameEl.textContent = 'PERSONA';

        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.appendChild(document.createTextNode('I see. Good fortune you operate in '));

        ['Belgium', 'Netherlands', 'Germany', 'Other'].forEach((loc, i) => {
          const opt = document.createElement('span');
          opt.className = 'loc-option';
          opt.textContent = `[${loc}]`;
          opt.style.opacity = '0';
          opt.style.animation = `rippleIn 0.3s ease ${i * 90}ms forwards`;
          opt.addEventListener('click', () => selectLocation(loc, dial, wrap));
          dial.appendChild(opt);
          if (i < 3) dial.appendChild(document.createTextNode(' '));
        });

        wrap.appendChild(nameEl);
        wrap.appendChild(dial);
        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        scrollToBottom();
      }

      function selectLocation(loc, dialEl, wrapEl) {
        formData['location'] = loc;
        buildCountryDial(dialEl, loc);
        histEl.appendChild(wrapEl);

        const youBlock = document.createElement('div');
        youBlock.className = 'celtx-block';
        youBlock.appendChild(makeYouCharEl());
        const yd = document.createElement('span');
        yd.className = 'celtx-dial celtx-dial-user';
        yd.appendChild(makeMarked('I know, right. I love it here.'));
        youBlock.appendChild(yd);
        fadeIn(youBlock, 0);
        histEl.appendChild(youBlock);

        currEl.innerHTML = '';
        scrollToBottom();

        setTimeout(() => {
          const soBlock = makeResonaBlock('So... what are you waiting for?');
          fadeIn(soBlock, 0);
          histEl.appendChild(soBlock);
          scrollToBottom();
        }, 1000);

        setTimeout(showEmailStep, 2400);
      }

      // ── STEP 3: Email ─────────────────────────────────
      function showEmailStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        wrap.appendChild(makeYouCharEl());

        const line1 = document.createElement('span');
        line1.className = 'celtx-dial celtx-dial-user';
        line1.appendChild(makeMarked("I don't know. I have a strange feeling someone will reach out and listen to me."));
        wrap.appendChild(line1);

        const line2 = document.createElement('span');
        line2.className = 'celtx-dial celtx-dial-user';
        line2.appendChild(makeMarked("They'll reach me at"));
        wrap.appendChild(line2);

        // Label above the email input line
        const emailWrap = document.createElement('div');
        emailWrap.className = 'celtx-ink-wrap';

        const emailHint = document.createElement('span');
        emailHint.className = 'celtx-ink-hint';
        emailHint.textContent = 'your email address';

        const emailInp = document.createElement('input');
        emailInp.type = 'email';
        emailInp.className = 'celtx-ink';
        emailInp.setAttribute('autocomplete', 'email');

        const emailErr = document.createElement('span');
        emailErr.className = 'celtx-ink-hint';
        emailErr.style.cssText = 'color:#ef4444;display:none;opacity:1;';
        emailErr.textContent = 'That does not look like an email address.';

        emailWrap.appendChild(emailHint);
        emailWrap.appendChild(emailInp);
        emailWrap.appendChild(emailErr);
        wrap.appendChild(emailWrap);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        setTimeout(() => emailInp.focus(), 300);
        scrollToBottom();

        let idleTimer = null;
        let submitted = false;

        const commit = () => {
          if (submitted) return;
          const email = emailInp.value.trim();
          const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
          if (!valid) { emailErr.style.display = 'block'; emailInp.focus(); return; }
          emailErr.style.display = 'none';
          if (idleTimer) clearTimeout(idleTimer);
          submitted = true;
          formData['email'] = email;

          const done = document.createElement('div');
          done.className = 'celtx-block';
          done.appendChild(makeYouCharEl());
          const dl1 = document.createElement('span');
          dl1.className = 'celtx-dial celtx-dial-user';
          dl1.appendChild(makeMarked("I don't know. I have a strange feeling someone will reach out and listen to me."));
          done.appendChild(dl1);
          done.appendChild(makeEditableLine(email, 'email', "They'll reach me at "));
          histEl.appendChild(done);

          currEl.innerHTML = '';
          showIntentStep();
        };

        emailInp.addEventListener('input', () => {
          emailHint.style.opacity = emailInp.value.length ? '0' : '1';
          if (idleTimer) clearTimeout(idleTimer);
          if (emailInp.value.trim()) idleTimer = setTimeout(commit, 3000);
        });
        emailInp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
        });
        emailInp.addEventListener('blur', () => {
          if (emailInp.value.trim() && !submitted) commit();
        });
      }

      // ── STEP 4: Intent ────────────────────────────────
      function showIntentStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        const nameEl = document.createElement('span');
        nameEl.className = 'celtx-char celtx-char-resona';
        nameEl.textContent = 'PERSONA';

        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = 'What do you hope will happen next?';

        const opts = document.createElement('div');
        opts.className = 'celtx-options';

        const curiousBtn = document.createElement('button');
        curiousBtn.className = 'celtx-option';
        curiousBtn.type = 'button';
        curiousBtn.textContent = '[I am just curious]';
        curiousBtn.style.animationDelay = '0ms';
        curiousBtn.addEventListener('click', () => {
          formData['intent'] = 'curious';
          opts.remove();
          histEl.appendChild(wrap);
          const yb = document.createElement('div');
          yb.className = 'celtx-block';
          yb.appendChild(makeYouCharEl());
          const yd = document.createElement('span');
          yd.className = 'celtx-dial celtx-dial-user';
          yd.appendChild(makeMarked('I am just curious.'));
          yb.appendChild(yd);
          fadeIn(yb, 0);
          histEl.appendChild(yb);
          currEl.innerHTML = '';
          scrollToBottom();
          setTimeout(showSubmitStep, 800);
        });

        const explainBtn = document.createElement('button');
        explainBtn.className = 'celtx-option';
        explainBtn.type = 'button';
        explainBtn.textContent = '[Let me explain]';
        explainBtn.style.animationDelay = '90ms';
        explainBtn.addEventListener('click', () => {
          opts.remove();
          histEl.appendChild(wrap);
          currEl.innerHTML = '';

          const youWrap = document.createElement('div');
          youWrap.className = 'celtx-block';
          youWrap.appendChild(makeYouCharEl());

          const prelude = document.createElement('span');
          prelude.className = 'celtx-dial celtx-dial-user';
          prelude.appendChild(makeMarked('Let me explain:'));
          youWrap.appendChild(prelude);

          const ta = document.createElement('textarea');
          ta.className = 'celtx-ink';
          ta.rows = 1;
          ta.placeholder = '...';
          youWrap.appendChild(ta);

          let idleTimer = null;
          let committed = false;
          const commit = () => {
            if (committed) return;
            const v = ta.value.trim();
            if (!v) return;
            committed = true;
            if (idleTimer) clearTimeout(idleTimer);
            formData['intent'] = v;
            const done = document.createElement('div');
            done.className = 'celtx-block';
            done.appendChild(makeYouCharEl());
            const dp = document.createElement('span');
            dp.className = 'celtx-dial celtx-dial-user';
            dp.appendChild(makeMarked('Let me explain:'));
            done.appendChild(dp);
            done.appendChild(makeEditableLine(v, 'intent', ''));
            histEl.appendChild(done);
            currEl.innerHTML = '';
            showSubmitStep();
          };

          ta.addEventListener('input', () => {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
            if (idleTimer) clearTimeout(idleTimer);
            if (ta.value.trim()) idleTimer = setTimeout(commit, 3000);
          });
          ta.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
          });
          ta.addEventListener('blur', () => { if (ta.value.trim()) commit(); });

          fadeIn(youWrap, 0);
          currEl.appendChild(youWrap);
          setTimeout(() => ta.focus(), 200);
          scrollToBottom();
        });

        opts.appendChild(curiousBtn);
        opts.appendChild(explainBtn);
        wrap.appendChild(nameEl);
        wrap.appendChild(dial);
        wrap.appendChild(opts);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        scrollToBottom();
      }

      // ── STEP 5: Submit ────────────────────────────────
      function showSubmitStep() {
        currEl.innerHTML = '';

        const resonaBlock = makeResonaBlock('Something shifted. Are you sure you are ready?');
        fadeIn(resonaBlock, 150);
        currEl.appendChild(resonaBlock);
        scrollToBottom();

        setTimeout(() => {
          const youWrap = document.createElement('div');
          youWrap.className = 'celtx-block';
          youWrap.appendChild(makeYouCharEl());

          const sendCol = document.createElement('div');
          sendCol.className = 'celtx-send-col';
          const btn = document.createElement('button');
          btn.className = 'button button-primary';
          btn.type = 'button';
          btn.textContent = 'I am.';
          sendCol.appendChild(btn);
          youWrap.appendChild(sendCol);

          fadeIn(youWrap, 0);
          currEl.appendChild(youWrap);
          scrollToBottom();

          btn.addEventListener('click', () => submitForm(btn));
        }, 700);
      }

      // ── Formspree submit ──────────────────────────────
      async function submitForm(btn) {
        btn.disabled    = true;
        btn.textContent = '...';

        const fd = new FormData();
        Object.entries(formData).forEach(([k, v]) => fd.append(k, v));
        fd.append('_subject', 'New conversation — Resonant XP');

        try {
          const res = await fetch('https://formspree.io/f/xdaynqov', {
            method: 'POST', body: fd,
            headers: { Accept: 'application/json' }
          });

          if (res.ok) {
            histEl.style.transition = 'opacity 0.6s ease';
            histEl.style.opacity = '0';
            currEl.style.transition = 'opacity 0.6s ease';
            currEl.style.opacity = '0';
            if (footEl) footEl.style.opacity = '0';
            envEl.style.backgroundColor = '#000';

            setTimeout(() => {
              histEl.innerHTML = '';
              currEl.innerHTML = '';
              histEl.style.opacity = '1';
              currEl.style.opacity = '1';

              const end = document.createElement('span');
              end.className = 'celtx-sd';
              end.style.color      = '#ffffff';
              end.style.marginTop  = '3em';
              end.style.opacity    = '0';
              end.style.transition = 'opacity 0.9s ease';
              end.textContent = '(End of scene one.)';
              currEl.appendChild(end);
              requestAnimationFrame(() => requestAnimationFrame(() => { end.style.opacity = '1'; }));
            }, 1400);

          } else {
            btn.disabled    = false;
            btn.textContent = 'I am.';
          }
        } catch {
          btn.disabled    = false;
          btn.textContent = 'I am.';
        }
      }

    })();
    </script>
