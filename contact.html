<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonant XP | Begin the conversation</title>
  <meta name="description" content="Start a conversation about designing an experience for your leadership team or organisation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Martel+Sans:wght@300;400;600;800&family=Linden+Hill:ital@0;1&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script src="header.js" defer></script>
  <script src="nav.js" defer></script>
  <style data-page-style>
    /* ===================================================
       CONTACT — CELTX STAGE PLAY FORMAT
       =================================================== */

    .celtx-env {
      background: #ffffff;
      min-height: 100vh;
      padding: var(--header-h, 80px) 1rem 8rem;
      transition: background-color 1.5s ease;
      display: flex;
      flex-direction: column;
    }

    .celtx-paper {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      line-height: 1.5;
      color: #000000;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    #scriptHistory {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 1rem;
    }

    .celtx-act, .celtx-scene {
      display: block;
      text-align: center;
      text-decoration: underline;
      font-weight: normal;
      margin: 0 0 0.8em;
      font-size: 12pt;
    }

    .celtx-sd {
      display: block;
      font-style: italic;
      padding-left: 3em;
      padding-right: 3em;
      margin: 0 0 2.5em;
      color: #222;
    }

    .celtx-block { margin: 0; }

    /* ── Character names ──────────────────────────── */
    .celtx-char {
      display: block;
      text-align: left;
      text-transform: uppercase;
      font-weight: normal;
      margin: 1.6em 0 0;
      font-size: 12pt;
    }

    .celtx-char-resona { color: #000; }

    /* YOU label — blue italic, no click interaction */
    .celtx-char-you-static {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      color: #2563eb;
      text-transform: none;
    }

    /* ── Dialogue ─────────────────────────────────── */
    .celtx-dial {
      display: block;
      padding-left: 3em;
      text-align: left;
      margin: 0;
      font-size: 12pt;
    }

    .celtx-dial-user {
      color: #2563eb;
      font-style: italic;
    }

    .celtx-dial-user[data-editable] {
      cursor: pointer;
    }
    .celtx-dial-user[data-editable]:hover {
      text-decoration: underline;
      text-decoration-style: dotted;
    }

    /* ── Inky inline inputs ───────────────────────── */
    .celtx-ink {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      font-size: 12pt;
      color: #2563eb;
      background: transparent;
      border: none;
      outline: none;
      padding: 0 0.1em;
      vertical-align: baseline;
      line-height: 1.5;
    }
    .celtx-ink::placeholder {
      color: #93c5fd;
      letter-spacing: 0.28em;
    }
    input.celtx-ink {
      border-bottom: 1px dotted rgba(37,99,235,0.35);
      display: inline;
    }
    textarea.celtx-ink {
      display: block;
      width: 100%;
      resize: none;
      overflow-y: hidden;
      border-bottom: 1px dotted rgba(37,99,235,0.3);
      padding-left: 3em;
      margin-top: 0.3em;
      box-sizing: border-box;
    }

    /* Ghost hint beside name input */
    .name-ghost {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      font-size: 0.82em;
      color: #93c5fd;
      margin-left: 1.4em;
      pointer-events: none;
      transition: opacity 0.3s;
      vertical-align: baseline;
    }

    /* ── Inline location options ──────────────────── */
    @keyframes rippleIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .loc-option {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      color: #2563eb;
      cursor: pointer;
      border-bottom: 1px dotted rgba(37,99,235,0.45);
      margin: 0 0.35em;
      display: inline;
      transition: color 0.15s;
    }
    .loc-option:hover { color: #1d4ed8; }

    /* ── Options block (intent) ───────────────────── */
    .celtx-options { padding-left: 3em; }

    .celtx-option {
      display: block;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      font-style: italic;
      color: #2563eb;
      padding: 0;
      line-height: 1.6;
      opacity: 0;
      animation: rippleIn 0.3s ease forwards;
      transition: color 0.15s;
    }
    .celtx-option:hover { color: #1d4ed8; }

    /* ── Send button ─────────────────────────────── */
    .celtx-send-col {
      padding-left: 3em;
      margin-top: 1.5em;
    }

    /* ── History ──────────────────────────────────── */
    #scriptHistory .celtx-block { opacity: 1; }
    #scriptHistory .celtx-dial-user { color: #2563eb; opacity: 1; }

    /* ── Foot note ───────────────────────────────── */
    .celtx-foot {
      margin-top: 5em;
      font-size: 9pt;
      font-style: italic;
      color: #bbb;
      text-align: center;
      transition: opacity 0.5s ease;
    }
    .celtx-foot a { color: #bbb; text-decoration: underline; }

    @media (max-width: 560px) {
      .celtx-paper { padding: 0 20px; }
    }
  </style>
</head>

<body class="contact-page">
  <div id="site-header"></div>

  <main style="position: relative; z-index: 1;">
    <div class="celtx-env" id="celtxEnv">
      <div class="celtx-paper">

        <span class="celtx-act">ACT I</span>
        <span class="celtx-scene">Scene 1</span>
        <span class="celtx-sd" id="celtxTimeSD"></span>

        <div id="scriptHistory"></div>
        <div id="scriptCurrent"></div>

        <p class="celtx-foot" id="celtxFoot">(Or write directly: <a href="mailto:lab@resonantxp.com">lab@resonantxp.com</a>)</p>

      </div>
    </div>

    <script>
    (function () {
      'use strict';

      const histEl = document.getElementById('scriptHistory');
      const currEl = document.getElementById('scriptCurrent');
      const envEl  = document.getElementById('celtxEnv');
      const footEl = document.getElementById('celtxFoot');

      let userName     = null;
      const formData   = {};
      let introResumed = false;

      // ── Dynamic time stage direction ─────────────────
      (function () {
        const now  = new Date();
        const hhmm = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        const hour = now.getHours();
        let detail;
        if      (hour >= 22 || hour < 5) detail = `It is late. A clock reads ${hhmm}. Someone is still here.`;
        else if (hour < 9)               detail = `Early. A clock reads ${hhmm}. The day has not decided what it wants to be.`;
        else if (hour < 12)              detail = `Morning. A clock reads ${hhmm}. The coffee is still warm.`;
        else if (hour < 14)              detail = `Just after noon. A clock reads ${hhmm}. The sandwich is getting cold.`;
        else if (hour < 17)             detail = `Afternoon. A clock reads ${hhmm}. The meeting that could have been an email has just ended.`;
        else if (hour < 20)              detail = `Early evening. A clock reads ${hhmm}. The office is thinning out.`;
        else                             detail = `Evening. A clock reads ${hhmm}. Someone is still at their desk.`;
        const el = document.getElementById('celtxTimeSD');
        if (el) el.textContent = detail;
      })();

      // ── Header height ─────────────────────────────────
      const headerEl = document.getElementById('site-header');
      if (headerEl) {
        const setH = () =>
          document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
        setH();
        new ResizeObserver(setH).observe(headerEl);
      }

      // ── Helpers ───────────────────────────────────────
      function userLabel() {
        return userName ? userName.split(' ')[0].toUpperCase() : 'YOU';
      }

      function makeYouCharEl() {
        const el = document.createElement('span');
        el.className = 'celtx-char celtx-char-you-static';
        el.textContent = userLabel();
        return el;
      }

      function makeResonaBlock(text) {
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';
        const name = document.createElement('span');
        name.className = 'celtx-char celtx-char-resona';
        name.textContent = 'RESONA';
        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = text;
        wrap.appendChild(name);
        wrap.appendChild(dial);
        return wrap;
      }

      function makeEditableLine(initialText, fieldName, prefix) {
        const wrap = document.createElement('span');
        wrap.className = 'celtx-dial celtx-dial-user';
        wrap.setAttribute('data-editable', fieldName);
        wrap.textContent = prefix ? prefix + initialText : initialText;
        wrap.addEventListener('click', () => {
          if (wrap.querySelector('input, textarea')) return;
          const current = formData[fieldName] || initialText;
          const inp = document.createElement('input');
          inp.type = fieldName === 'email' ? 'email' : 'text';
          inp.className = 'celtx-ink';
          inp.value = current;
          inp.style.display = 'inline';
          inp.style.width = fieldName === 'email' ? '14em' : '20em';
          wrap.textContent = prefix || '';
          wrap.appendChild(inp);
          inp.focus();
          inp.select();
          const commit = () => {
            const v = inp.value.trim() || current;
            formData[fieldName] = v;
            wrap.textContent = prefix ? prefix + v : v;
          };
          inp.addEventListener('blur', commit);
          inp.addEventListener('keydown', e => {
            if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
            if (e.key === 'Escape') { wrap.textContent = prefix ? prefix + current : current; }
          });
        });
        return wrap;
      }

      function fadeIn(el, delayMs) {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.45s ease';
        setTimeout(() => requestAnimationFrame(() => requestAnimationFrame(() => {
          el.style.opacity = '1';
        })), delayMs || 0);
      }

      function scrollToBottom() {
        setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 120);
      }

      // ── Intro ─────────────────────────────────────────
      const r1 = makeResonaBlock('Something is different about you.');
      r1.style.opacity = '0';
      r1.style.transition = 'opacity 0.45s ease';
      histEl.appendChild(r1);
      setTimeout(() => requestAnimationFrame(() => requestAnimationFrame(() => {
        r1.style.opacity = '1';
      })), 500);
      setTimeout(showNameStep, 1600);

      // ── STEP 0: Name ──────────────────────────────────
      function showNameStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        const charEl = document.createElement('span');
        charEl.className = 'celtx-char celtx-char-you-static';
        charEl.textContent = 'YOU';

        const dialEl = document.createElement('span');
        dialEl.className = 'celtx-dial';

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'celtx-ink';
        inp.placeholder = '·  ·  ·  ·  ·  ·  ·';
        inp.setAttribute('autocomplete', 'off');
        inp.style.width = '12em';

        const ghost = document.createElement('span');
        ghost.className = 'name-ghost';
        ghost.textContent = 'what is your name?';

        dialEl.appendChild(inp);
        dialEl.appendChild(ghost);
        wrap.appendChild(charEl);
        wrap.appendChild(dialEl);

        fadeIn(wrap, 0);
        currEl.appendChild(wrap);
        setTimeout(() => inp.focus(), 150);
        scrollToBottom();

        let idleTimer = null;

        function commit() {
          if (introResumed) return;
          const v = inp.value.trim();
          if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
          if (v) { userName = v; formData['name'] = v; }

          // Save name block to history
          const done = document.createElement('div');
          done.className = 'celtx-block';
          done.appendChild(makeYouCharEl());
          const dd = document.createElement('span');
          dd.className = 'celtx-dial celtx-dial-user';
          dd.textContent = userName || '—';
          done.appendChild(dd);
          histEl.appendChild(done);

          currEl.innerHTML = '';
          introResumed = true;
          continueAfterName();
        }

        inp.addEventListener('input', () => {
          ghost.style.opacity = inp.value.length ? '0' : '1';
          if (idleTimer) clearTimeout(idleTimer);
          if (inp.value.trim()) idleTimer = setTimeout(commit, 3000);
        });

        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
        });

        inp.addEventListener('blur', () => {
          if (inp.value.trim() && !introResumed) commit();
        });
      }

      function continueAfterName() {
        const r2 = makeResonaBlock('As if you cannot just sit still? That small reflex — a twitch in your leg. I have it sometimes. My body tells me it is time to move. And yet... I don\'t.');
        fadeIn(r2, 300);
        histEl.appendChild(r2);
        scrollToBottom();
        setTimeout(showSituationStep, 2200);
      }

      // ── STEP 1: Situation ─────────────────────────────
      function showSituationStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        wrap.appendChild(makeYouCharEl());

        const prelude = document.createElement('span');
        prelude.className = 'celtx-dial celtx-dial-user';
        prelude.textContent = 'Let me be a bit more specific about what I\'m looking for.';
        wrap.appendChild(prelude);

        const ta = document.createElement('textarea');
        ta.className = 'celtx-ink';
        ta.rows = 1;
        ta.placeholder = '· · · · · · · · · · · · · · ·';
        wrap.appendChild(ta);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        setTimeout(() => ta.focus(), 300);
        scrollToBottom();

        let idleTimer = null;

        const commit = () => {
          const v = ta.value.trim();
          if (!v) return;
          if (idleTimer) clearTimeout(idleTimer);
          formData['situation'] = v;

          const done = document.createElement('div');
          done.className = 'celtx-block';
          done.appendChild(makeYouCharEl());
          const dp = document.createElement('span');
          dp.className = 'celtx-dial celtx-dial-user';
          dp.textContent = 'Let me be a bit more specific about what I\'m looking for.';
          done.appendChild(dp);
          done.appendChild(makeEditableLine(v, 'situation', ''));
          histEl.appendChild(done);

          currEl.innerHTML = '';
          showLocationStep();
        };

        ta.addEventListener('input', () => {
          ta.style.height = 'auto';
          ta.style.height = ta.scrollHeight + 'px';
          if (idleTimer) clearTimeout(idleTimer);
          if (ta.value.trim()) idleTimer = setTimeout(commit, 3000);
        });

        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        });

        ta.addEventListener('blur', () => {
          if (ta.value.trim()) commit();
        });
      }

      // ── STEP 2: Location ──────────────────────────────
      function showLocationStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        const nameEl = document.createElement('span');
        nameEl.className = 'celtx-char celtx-char-resona';
        nameEl.textContent = 'RESONA';

        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.appendChild(document.createTextNode('Good fortune you operate in '));

        ['Belgium', 'Netherlands', 'Germany', 'Other'].forEach((loc, i) => {
          const opt = document.createElement('span');
          opt.className = 'loc-option';
          opt.textContent = loc;
          opt.style.opacity = '0';
          opt.style.animation = `rippleIn 0.3s ease ${i * 90}ms forwards`;
          opt.addEventListener('click', () => selectLocation(loc, dial, wrap));
          dial.appendChild(opt);
          if (i < 3) dial.appendChild(document.createTextNode('\u00a0'));
        });

        wrap.appendChild(nameEl);
        wrap.appendChild(dial);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        scrollToBottom();
      }

      function selectLocation(loc, dialEl, wrapEl) {
        formData['location'] = loc;
        while (dialEl.firstChild) dialEl.removeChild(dialEl.firstChild);
        dialEl.textContent = `Good fortune you operate in ${loc}.`;
        histEl.appendChild(wrapEl);

        const youBlock = document.createElement('div');
        youBlock.className = 'celtx-block';
        youBlock.appendChild(makeYouCharEl());
        const yd = document.createElement('span');
        yd.className = 'celtx-dial celtx-dial-user';
        yd.textContent = 'I know right. I love it here.';
        youBlock.appendChild(yd);
        fadeIn(youBlock, 0);
        histEl.appendChild(youBlock);

        currEl.innerHTML = '';
        scrollToBottom();

        setTimeout(() => {
          const soBlock = makeResonaBlock('So... what are you waiting for.');
          fadeIn(soBlock, 0);
          histEl.appendChild(soBlock);
          scrollToBottom();
        }, 1000);

        setTimeout(showIntentStep, 2400);
      }

      // ── STEP 2b: Intent ───────────────────────────────
      function showIntentStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        const nameEl = document.createElement('span');
        nameEl.className = 'celtx-char celtx-char-resona';
        nameEl.textContent = 'RESONA';

        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = 'What will happen next, you think?';

        const opts = document.createElement('div');
        opts.className = 'celtx-options';

        const curiousBtn = document.createElement('button');
        curiousBtn.className = 'celtx-option';
        curiousBtn.type = 'button';
        curiousBtn.textContent = 'I am just curious.';
        curiousBtn.style.animationDelay = '0ms';
        curiousBtn.addEventListener('click', () => {
          formData['intent'] = 'curious';
          opts.remove();
          histEl.appendChild(wrap);
          const yb = document.createElement('div');
          yb.className = 'celtx-block';
          yb.appendChild(makeYouCharEl());
          const yd = document.createElement('span');
          yd.className = 'celtx-dial celtx-dial-user';
          yd.textContent = 'I am just curious.';
          yb.appendChild(yd);
          fadeIn(yb, 0);
          histEl.appendChild(yb);
          currEl.innerHTML = '';
          scrollToBottom();
          setTimeout(showEmailStep, 1000);
        });

        const explainBtn = document.createElement('button');
        explainBtn.className = 'celtx-option';
        explainBtn.type = 'button';
        explainBtn.textContent = 'Let me explain:';
        explainBtn.style.animationDelay = '90ms';
        explainBtn.addEventListener('click', () => {
          opts.remove();
          histEl.appendChild(wrap);
          currEl.innerHTML = '';

          const youWrap = document.createElement('div');
          youWrap.className = 'celtx-block';
          youWrap.appendChild(makeYouCharEl());

          const prelude = document.createElement('span');
          prelude.className = 'celtx-dial celtx-dial-user';
          prelude.textContent = 'Let me explain:';
          youWrap.appendChild(prelude);

          const ta = document.createElement('textarea');
          ta.className = 'celtx-ink';
          ta.rows = 1;
          ta.placeholder = '· · · · · · · · · · · · ·';
          youWrap.appendChild(ta);

          let idleTimer = null;
          const commit = () => {
            const v = ta.value.trim();
            if (!v) return;
            if (idleTimer) clearTimeout(idleTimer);
            formData['intent'] = v;
            const done = document.createElement('div');
            done.className = 'celtx-block';
            done.appendChild(makeYouCharEl());
            const dp = document.createElement('span');
            dp.className = 'celtx-dial celtx-dial-user';
            dp.textContent = 'Let me explain:';
            done.appendChild(dp);
            done.appendChild(makeEditableLine(v, 'intent', ''));
            histEl.appendChild(done);
            currEl.innerHTML = '';
            showEmailStep();
          };

          ta.addEventListener('input', () => {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
            if (idleTimer) clearTimeout(idleTimer);
            if (ta.value.trim()) idleTimer = setTimeout(commit, 3000);
          });
          ta.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
          });
          ta.addEventListener('blur', () => {
            if (ta.value.trim()) commit();
          });

          fadeIn(youWrap, 0);
          currEl.appendChild(youWrap);
          setTimeout(() => ta.focus(), 200);
          scrollToBottom();
        });

        opts.appendChild(curiousBtn);
        opts.appendChild(explainBtn);
        wrap.appendChild(nameEl);
        wrap.appendChild(dial);
        wrap.appendChild(opts);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        scrollToBottom();
      }

      // ── STEP 3: Email ──────────────────────────────────
      function showEmailStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        wrap.appendChild(makeYouCharEl());

        const line1 = document.createElement('span');
        line1.className = 'celtx-dial celtx-dial-user';
        line1.textContent = "I don't know. I have a strange feeling someone will reach out and listen to me.";
        wrap.appendChild(line1);

        const line2 = document.createElement('span');
        line2.className = 'celtx-dial celtx-dial-user';
        line2.appendChild(document.createTextNode("They'll reach me at "));

        const emailInp = document.createElement('input');
        emailInp.type = 'email';
        emailInp.className = 'celtx-ink';
        emailInp.placeholder = '· · · · · · ·';
        emailInp.style.width = '14em';
        line2.appendChild(emailInp);
        wrap.appendChild(line2);

        const emailErr = document.createElement('span');
        emailErr.className = 'celtx-dial';
        emailErr.style.cssText = 'font-size:0.8em;color:#ef4444;display:none;padding-left:3em;';
        emailErr.textContent = 'that does not look like an email address.';
        wrap.appendChild(emailErr);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        setTimeout(() => emailInp.focus(), 300);
        scrollToBottom();

        let idleTimer = null;
        let submitted = false;

        const commit = () => {
          if (submitted) return;
          const email = emailInp.value.trim();
          const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
          if (!valid) {
            emailErr.style.display = 'block';
            emailInp.focus();
            return;
          }
          emailErr.style.display = 'none';
          if (idleTimer) clearTimeout(idleTimer);
          submitted = true;
          formData['email'] = email;

          const done = document.createElement('div');
          done.className = 'celtx-block';
          done.appendChild(makeYouCharEl());
          const dl1 = document.createElement('span');
          dl1.className = 'celtx-dial celtx-dial-user';
          dl1.textContent = "I don't know. I have a strange feeling someone will reach out and listen to me.";
          done.appendChild(dl1);
          done.appendChild(makeEditableLine(email, 'email', "They'll reach me at "));
          histEl.appendChild(done);

          currEl.innerHTML = '';
          showSubmitStep();
        };

        emailInp.addEventListener('input', () => {
          if (idleTimer) clearTimeout(idleTimer);
          if (emailInp.value.trim()) idleTimer = setTimeout(commit, 3000);
        });
        emailInp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
        });
        emailInp.addEventListener('blur', () => {
          if (emailInp.value.trim() && !submitted) commit();
        });
      }

      // ── STEP 4: Submit ────────────────────────────────
      function showSubmitStep() {
        currEl.innerHTML = '';

        const resonaBlock = makeResonaBlock('Something shifted. Are you sure you are ready?');
        fadeIn(resonaBlock, 150);
        currEl.appendChild(resonaBlock);
        scrollToBottom();

        setTimeout(() => {
          const youWrap = document.createElement('div');
          youWrap.className = 'celtx-block';
          youWrap.appendChild(makeYouCharEl());

          const sendCol = document.createElement('div');
          sendCol.className = 'celtx-send-col';
          const btn = document.createElement('button');
          btn.className = 'button button-primary';
          btn.type = 'button';
          btn.textContent = 'I am.';
          sendCol.appendChild(btn);
          youWrap.appendChild(sendCol);

          fadeIn(youWrap, 0);
          currEl.appendChild(youWrap);
          scrollToBottom();

          btn.addEventListener('click', () => submitForm(btn));
        }, 700);
      }

      // ── Formspree submit ──────────────────────────────
      async function submitForm(btn) {
        btn.disabled    = true;
        btn.textContent = '...';

        const fd = new FormData();
        Object.entries(formData).forEach(([k, v]) => fd.append(k, v));
        fd.append('_subject', 'New conversation — Resonant XP');

        try {
          const res = await fetch('https://formspree.io/f/xdaynqov', {
            method: 'POST', body: fd,
            headers: { Accept: 'application/json' }
          });

          if (res.ok) {
            histEl.style.transition = 'opacity 0.6s ease';
            histEl.style.opacity = '0';
            currEl.style.transition = 'opacity 0.6s ease';
            currEl.style.opacity = '0';
            if (footEl) footEl.style.opacity = '0';
            envEl.style.backgroundColor = '#000';

            setTimeout(() => {
              histEl.innerHTML = '';
              currEl.innerHTML = '';
              histEl.style.opacity = '1';
              currEl.style.opacity = '1';

              const end = document.createElement('span');
              end.className = 'celtx-sd';
              end.style.color     = '#ffffff';
              end.style.marginTop = '3em';
              end.style.opacity   = '0';
              end.style.transition = 'opacity 0.9s ease';
              end.textContent = '(End of scene one.)';
              currEl.appendChild(end);
              requestAnimationFrame(() => requestAnimationFrame(() => { end.style.opacity = '1'; }));
            }, 1400);

          } else {
            btn.disabled    = false;
            btn.textContent = 'I am.';
          }
        } catch {
          btn.disabled    = false;
          btn.textContent = 'I am.';
        }
      }

    })();
    </script>
