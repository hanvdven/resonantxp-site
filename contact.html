<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonant XP | Begin the conversation</title>
  <meta name="description" content="Start a conversation about designing an experience for your leadership team or organisation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Martel+Sans:wght@300;400;600;800&family=Linden+Hill:ital@0;1&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script src="header.js" defer></script>
  <script src="nav.js" defer></script>
  <style data-page-style>
    /* ===================================================
       CONTACT — CELTX STAGE PLAY FORMAT
       =================================================== */

    .celtx-env {
      background: #ffffff;
      min-height: 100vh;
      padding: calc(var(--header-h, 80px) + 0.5rem) 1rem 8rem;
      transition: background-color 1.5s ease;
      display: flex;
      flex-direction: column;
    }

    .celtx-paper {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      line-height: 1.5;
      color: #000000;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    #scriptHistory {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 1rem;
    }

    .celtx-act, .celtx-scene {
      display: block;
      text-align: center;
      text-decoration: underline;
      font-weight: normal;
      margin: 0 0 0.8em;
      font-size: 12pt;
    }

    .celtx-sd {
      display: block;
      font-style: italic;
      padding-left: 3em;
      padding-right: 3em;
      margin: 0 0 2.5em;
      color: #222;
    }

    .celtx-block { margin: 0; }

    /* ── Character names ──────────────────────────── */
    .celtx-char {
      display: block;
      text-align: left;
      text-transform: uppercase;
      font-weight: normal;
      margin: 1.6em 0 0;
      font-size: 12pt;
    }

    .celtx-char-resona { color: #000; }

    .celtx-char-you {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      color: #2563eb;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
    }

    .celtx-name-hint {
      display: block;
      font-family: 'Courier New', Courier, monospace;
      font-size: 9pt;
      font-style: italic;
      color: #94a3b8;
      margin: 0;
    }
    .celtx-name-hint.hidden { display: none; }

    .celtx-name-inp {
      background: transparent;
      border: none;
      border-bottom: 1px solid #2563eb;
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      font-size: 12pt;
      color: #2563eb;
      outline: none;
      width: 14em;
      padding: 0;
      text-transform: uppercase;
    }
    .celtx-name-inp::placeholder { color: #93c5fd; text-transform: none; }

    /* ── Dialogue ─────────────────────────────────── */
    .celtx-dial {
      display: block;
      padding-left: 3em;
      text-align: left;
      margin: 0;
      font-size: 12pt;
    }

    /* User dialogue — blue, always */
    .celtx-dial-user {
      color: #2563eb;
      font-style: italic;
    }

    /* Editable history lines */
    .celtx-dial-user[data-editable] {
      cursor: pointer;
    }
    .celtx-dial-user[data-editable]:hover {
      text-decoration: underline;
      text-decoration-style: dotted;
    }

    /* ── Inputs — no border, blue text ───────────── */
    .celtx-input-col {
      display: block;
      padding-left: 3em;
      padding-right: 1em;
      margin-top: 1.2em;
    }

    .celtx-input {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      color: #2563eb;
      padding: 0;
      outline: none;
      resize: none;
      line-height: 1.5;
      overflow-y: hidden;
      font-style: italic;
    }
    .celtx-input::placeholder { color: #93c5fd; font-style: italic; }
    .celtx-input:disabled { opacity: 0.35; }

    /* ── Options ─────────────────────────────────── */
    @keyframes rippleIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .celtx-options { padding-left: 3em; }

    .celtx-option {
      display: block;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12pt;
      font-style: italic;
      color: #2563eb;
      padding: 0;
      line-height: 1.6;
      opacity: 0;
      animation: rippleIn 0.3s ease forwards;
      transition: color 0.15s;
    }
    .celtx-option:hover { color: #1d4ed8; }

    /* ── Send button ─────────────────────────────── */
    .celtx-send-col {
      padding-left: 3em;
      margin-top: 1.5em;
    }

    /* ── History — full opacity, blue user text ──── */
    #scriptHistory .celtx-block { opacity: 1; }
    #scriptHistory .celtx-dial-user { color: #2563eb; opacity: 1; }

    /* ── Foot note ───────────────────────────────── */
    .celtx-foot {
      margin-top: 5em;
      font-size: 9pt;
      font-style: italic;
      color: #bbb;
      text-align: center;
      transition: opacity 0.5s ease;
    }
    .celtx-foot a { color: #bbb; text-decoration: underline; }

    @media (max-width: 560px) {
      .celtx-paper { padding: 0 20px; }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <main style="position: relative; z-index: 1;">
    <div class="celtx-env" id="celtxEnv">
      <div class="celtx-paper">

        <span class="celtx-act">ACT I</span>
        <span class="celtx-scene">Scene 1</span>
        <span class="celtx-sd" id="celtxTimeSD"></span>

        <div id="scriptHistory"></div>
        <div id="scriptCurrent"></div>

        <p class="celtx-foot" id="celtxFoot">(Or write directly: <a href="mailto:lab@resonantxp.com">lab@resonantxp.com</a>)</p>

      </div>
    </div>

    <script>
    (function () {
      'use strict';

      const histEl = document.getElementById('scriptHistory');
      const currEl = document.getElementById('scriptCurrent');
      const envEl  = document.getElementById('celtxEnv');
      const footEl = document.getElementById('celtxFoot');

      let userName    = null;
      let firstHintEl = null;
      let situationTA = null; // ref to enable after name entered
      const formData  = {};

      // ── Dynamic time stage direction ─────────────────
      (function () {
        const now  = new Date();
        const hhmm = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        const hour = now.getHours();
        let detail;
        if      (hour >= 22 || hour < 5) detail = `It is late. A clock reads ${hhmm}. Someone is still here.`;
        else if (hour < 9)               detail = `Early. A clock reads ${hhmm}. The day has not decided what it wants to be.`;
        else if (hour < 12)              detail = `Morning. A clock reads ${hhmm}. The coffee is still warm.`;
        else if (hour < 14)              detail = `Just after noon. A clock reads ${hhmm}. The sandwich is getting cold.`;
        else if (hour < 17)              detail = `Afternoon. A clock reads ${hhmm}. The meeting that could have been an email has just ended.`;
        else if (hour < 20)              detail = `Early evening. A clock reads ${hhmm}. The office is thinning out.`;
        else                             detail = `Evening. A clock reads ${hhmm}. Someone is still at their desk.`;
        const el = document.getElementById('celtxTimeSD');
        if (el) el.textContent = detail;
      })();

      // ── Header height ─────────────────────────────────
      const headerEl = document.getElementById('site-header');
      if (headerEl) {
        const setH = () =>
          document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
        setH();
        new ResizeObserver(setH).observe(headerEl);
      }

      // ── Helpers ───────────────────────────────────────
      function userLabel() {
        return userName ? userName.split(' ')[0].toUpperCase() : 'YOU';
      }

      function syncAllYouLabels() {
        document.querySelectorAll('.js-you-label').forEach(el => {
          if (!el.querySelector('input')) el.textContent = userLabel();
        });
        if (firstHintEl) firstHintEl.classList.add('hidden');
        // Enable situation textarea if waiting
        if (situationTA && userName) {
          situationTA.disabled = false;
          situationTA.focus();
        }
        // Continue animation after name entry
        if (userName && !window._introResumed) {
          window._introResumed = true;
          continueAfterName();
        }
      }

      function continueAfterName() {
        // Move name block to history
        currEl.innerHTML = '';

        const r2 = makeResonaBlock('As if you cannot just sit still? That small reflex — a twitch in your leg. I have it sometimes. My body tells me it is time to move. And yet... I don\'t.');
        r2.style.opacity = '0';
        r2.style.transition = 'opacity 0.45s ease';
        histEl.appendChild(r2);
        setTimeout(() => requestAnimationFrame(() => requestAnimationFrame(() => {
          r2.style.opacity = '1';
        })), 300);
        setTimeout(showSituationStep, 2000);
      }

      function fadeIn(el, delayMs) {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.45s ease';
        setTimeout(() => requestAnimationFrame(() => requestAnimationFrame(() => {
          el.style.opacity = '1';
        })), delayMs || 0);
      }

      function scrollToBottom() {
        setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 120);
      }

      // ── YOU label (name-editable) ─────────────────────
      function makeYouLabel(isFirst) {
        const labelEl = document.createElement('span');
        labelEl.className = 'celtx-char celtx-char-you js-you-label';
        labelEl.textContent = userLabel();
        labelEl.addEventListener('click', () => activateName(labelEl));
        const wrapper = document.createElement('div');
        wrapper.appendChild(labelEl);
        if (isFirst) {
          const hint = document.createElement('span');
          hint.className = 'celtx-name-hint' + (userName ? ' hidden' : '');
          hint.textContent = '(click to enter your name)';
          firstHintEl = hint;
          wrapper.appendChild(hint);
        }
        return wrapper;
      }

      function activateName(labelEl) {
        if (labelEl.querySelector('input')) return;
        const prev = labelEl.textContent;
        const inp = document.createElement('input');
        inp.className   = 'celtx-name-inp';
        inp.type        = 'text';
        inp.placeholder = '... your name';
        labelEl.textContent = '';
        labelEl.appendChild(inp);
        inp.focus();
        const confirm = () => {
          const v = inp.value.trim();
          if (v) { userName = v; formData['name'] = v; }
          labelEl.textContent = userLabel();
          syncAllYouLabels();
        };
        inp.addEventListener('blur', confirm);
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
          if (e.key === 'Escape') { labelEl.textContent = prev; }
        });
      }

      // ── Block builders ────────────────────────────────
      function makeResonaBlock(text) {
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';
        const name = document.createElement('span');
        name.className = 'celtx-char celtx-char-resona';
        name.textContent = 'RESONA';
        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = text;
        wrap.appendChild(name);
        wrap.appendChild(dial);
        return wrap;
      }

      function makeYouStaticBlock(text, isFirst) {
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';
        wrap.appendChild(makeYouLabel(isFirst));
        const dial = document.createElement('span');
        dial.className = 'celtx-dial celtx-dial-user';
        dial.textContent = text;
        wrap.appendChild(dial);
        return wrap;
      }

      // Editable history span for user-provided values
      function makeEditableLine(initialText, fieldName, prefix) {
        const wrap = document.createElement('span');
        wrap.className = 'celtx-dial celtx-dial-user';
        wrap.setAttribute('data-editable', fieldName);
        wrap.textContent = prefix ? prefix + initialText : initialText;

        wrap.addEventListener('click', () => {
          if (wrap.querySelector('input, textarea')) return;
          const current = formData[fieldName] || initialText;
          const inp = document.createElement('input');
          inp.type = fieldName === 'email' ? 'email' : 'text';
          inp.className = 'celtx-input';
          inp.value = current;
          inp.style.display = 'inline';
          inp.style.width = '100%';
          wrap.textContent = prefix || '';
          wrap.appendChild(inp);
          inp.focus();
          inp.select();
          const commit = () => {
            const v = inp.value.trim() || current;
            formData[fieldName] = v;
            wrap.textContent = prefix ? prefix + v : v;
          };
          inp.addEventListener('blur', commit);
          inp.addEventListener('keydown', e => {
            if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
            if (e.key === 'Escape') { wrap.textContent = prefix ? prefix + current : current; }
          });
        });
        return wrap;
      }

      // ── Intro sequence — pauses at YOU for name entry ────
      const r1 = makeResonaBlock('Something is different about you.');
      r1.style.opacity = '0';
      r1.style.transition = 'opacity 0.45s ease';
      histEl.appendChild(r1);
      setTimeout(() => requestAnimationFrame(() => requestAnimationFrame(() => {
        r1.style.opacity = '1';
      })), 500);

      // Show name input after first RESONA line — animation pauses here
      setTimeout(showNameStep, 1600);

      function showNameStep() {
        currEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';
        wrap.appendChild(makeYouLabel(true));
        fadeIn(wrap, 0);
        currEl.appendChild(wrap);
        scrollToBottom();
      }

      // ── STEP 1: Situation ─────────────────────────────
      function showSituationStep() {
        currEl.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';
        wrap.appendChild(makeYouLabel(false));

        const prelude = document.createElement('span');
        prelude.className = 'celtx-dial celtx-dial-user';
        prelude.textContent = 'Hmm. Let me be a bit more specific:';
        wrap.appendChild(prelude);

        const col = document.createElement('div');
        col.className = 'celtx-input-col';

        const ta = document.createElement('textarea');
        ta.className = 'celtx-input';
        ta.rows = 1;
        ta.placeholder = '...';
        situationTA = ta;

        ta.addEventListener('input', () => {
          ta.style.height = 'auto';
          ta.style.height = ta.scrollHeight + 'px';
        });
        col.appendChild(ta);
        wrap.appendChild(col);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        setTimeout(() => ta.focus(), 300);
        scrollToBottom();

        const commit = () => {
          const v = ta.value.trim();
          if (!v) return;
          formData['situation'] = v;
          situationTA = null;

          const done = makeYouStaticBlock('Hmm. Let me be a bit more specific:', false);
          const editLine = makeEditableLine(v, 'situation', '');
          done.appendChild(editLine);
          histEl.appendChild(done);

          currEl.innerHTML = '';
          showLocationStep();
        };

        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        });
      }

      // ── STEP 2: Location ──────────────────────────────
      function showLocationStep() {
        currEl.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        const name = document.createElement('span');
        name.className = 'celtx-char celtx-char-resona';
        name.textContent = 'RESONA';

        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = 'I see. Good fortune you operate in...';

        const opts = document.createElement('div');
        opts.className = 'celtx-options';
        ['Belgium', 'Netherlands', 'Germany', 'Other'].forEach((loc, i) => {
          const btn = document.createElement('button');
          btn.className = 'celtx-option';
          btn.type = 'button';
          btn.textContent = loc;
          btn.style.animationDelay = (i * 90) + 'ms';
          btn.addEventListener('click', () => selectLocation(loc, dial, opts, wrap));
          opts.appendChild(btn);
        });

        wrap.appendChild(name);
        wrap.appendChild(dial);
        wrap.appendChild(opts);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        scrollToBottom();
      }

      function selectLocation(loc, dialEl, optsEl, wrapEl) {
        formData['location'] = loc;
        dialEl.textContent = `I see. Good fortune you operate in ${loc}.`;
        optsEl.remove();
        histEl.appendChild(wrapEl);

        const youBlock = makeYouStaticBlock('I know right. I love it here.', false);
        youBlock.style.opacity = '0';
        youBlock.style.transition = 'opacity 0.45s ease';
        histEl.appendChild(youBlock);
        requestAnimationFrame(() => requestAnimationFrame(() => { youBlock.style.opacity = '1'; }));

        currEl.innerHTML = '';
        scrollToBottom();

        // RESONA: "So... what are you waiting for."
        setTimeout(() => {
          const soBlock = makeResonaBlock('So... what are you waiting for.');
          soBlock.style.opacity = '0';
          soBlock.style.transition = 'opacity 0.45s ease';
          histEl.appendChild(soBlock);
          requestAnimationFrame(() => requestAnimationFrame(() => { soBlock.style.opacity = '1'; }));
          scrollToBottom();
        }, 1000);

        setTimeout(showIntentStep, 2400);
      }

      // ── STEP 2b: Intent choice ───────────────────────
      function showIntentStep() {
        currEl.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';

        const name = document.createElement('span');
        name.className = 'celtx-char celtx-char-resona';
        name.textContent = 'RESONA';

        const dial = document.createElement('span');
        dial.className = 'celtx-dial';
        dial.textContent = 'What will happen next, you think?';

        const opts = document.createElement('div');
        opts.className = 'celtx-options';

        const curious = document.createElement('button');
        curious.className = 'celtx-option';
        curious.type = 'button';
        curious.textContent = 'I am just curious.';
        curious.style.animationDelay = '0ms';
        curious.addEventListener('click', () => {
          formData['intent'] = 'curious';
          dial.textContent = 'What will happen next, you think?';
          opts.remove();
          histEl.appendChild(wrap);
          const youBlock = makeYouStaticBlock('I am just curious.', false);
          youBlock.style.opacity = '0';
          youBlock.style.transition = 'opacity 0.45s ease';
          histEl.appendChild(youBlock);
          requestAnimationFrame(() => requestAnimationFrame(() => { youBlock.style.opacity = '1'; }));
          currEl.innerHTML = '';
          scrollToBottom();
          setTimeout(showEmailStep, 1000);
        });

        const explain = document.createElement('button');
        explain.className = 'celtx-option';
        explain.type = 'button';
        explain.textContent = 'Let me explain:';
        explain.style.animationDelay = '90ms';
        explain.addEventListener('click', () => {
          opts.remove();
          histEl.appendChild(wrap);
          currEl.innerHTML = '';

          const youWrap = document.createElement('div');
          youWrap.className = 'celtx-block';
          youWrap.appendChild(makeYouLabel(false));
          const prelude = document.createElement('span');
          prelude.className = 'celtx-dial celtx-dial-user';
          prelude.textContent = 'Let me explain:';
          youWrap.appendChild(prelude);
          const col = document.createElement('div');
          col.className = 'celtx-input-col';
          const ta = document.createElement('textarea');
          ta.className = 'celtx-input';
          ta.rows = 1;
          ta.placeholder = '...';
          ta.addEventListener('input', () => {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
          });
          col.appendChild(ta);
          youWrap.appendChild(col);
          fadeIn(youWrap, 0);
          currEl.appendChild(youWrap);
          setTimeout(() => ta.focus(), 200);
          scrollToBottom();

          const commit = () => {
            const v = ta.value.trim();
            if (!v) return;
            formData['intent'] = v;
            const done = makeYouStaticBlock('Let me explain:', false);
            done.appendChild(makeEditableLine(v, 'intent', ''));
            histEl.appendChild(done);
            currEl.innerHTML = '';
            showEmailStep();
          };
          ta.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
          });
        });

        opts.appendChild(curious);
        opts.appendChild(explain);
        wrap.appendChild(name);
        wrap.appendChild(dial);
        wrap.appendChild(opts);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        scrollToBottom();
      }

      // ── STEP 3: Email + Expectations ─────────────────
      function showEmailStep() {
        currEl.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'celtx-block';
        wrap.appendChild(makeYouLabel(false));

        const prelude = document.createElement('span');
        prelude.className = 'celtx-dial celtx-dial-user';
        prelude.textContent = "I don't know. I have a strange feeling someone will reach out and listen to me.";
        wrap.appendChild(prelude);

        const emailLabel = document.createElement('span');
        emailLabel.className = 'celtx-dial celtx-dial-user';
        emailLabel.textContent = "They'll reach me at: (";
        wrap.appendChild(emailLabel);

        const emailCol = document.createElement('div');
        emailCol.className = 'celtx-input-col';
        const emailRow = document.createElement('div');
        emailRow.style.cssText = 'display:flex;align-items:baseline;gap:0.2em;';
        const emailInp = document.createElement('input');
        emailInp.type = 'email';
        emailInp.className = 'celtx-input';
        emailInp.placeholder = '...';
        emailInp.style.flex = '1';
        const closeP = document.createElement('span');
        closeP.className = 'celtx-dial celtx-dial-user';
        closeP.textContent = ')';
        emailRow.appendChild(emailInp);
        emailRow.appendChild(closeP);
        emailCol.appendChild(emailRow);
        wrap.appendChild(emailCol);

        const emailErr = document.createElement('span');
        emailErr.className = 'celtx-dial';
        emailErr.style.cssText = 'font-size:0.8em;color:#ef4444;display:none;padding-left:3em;';
        emailErr.textContent = 'that does not look like an email address.';
        wrap.appendChild(emailErr);

        const expLabel = document.createElement('span');
        expLabel.className = 'celtx-dial celtx-dial-user';
        expLabel.style.marginTop = '0.4em';
        expLabel.textContent = "They'll help me by: (optional)";
        wrap.appendChild(expLabel);

        const expCol = document.createElement('div');
        expCol.className = 'celtx-input-col';
        const expTa = document.createElement('textarea');
        expTa.className = 'celtx-input';
        expTa.rows = 1;
        expTa.placeholder = '...';
        expTa.addEventListener('input', () => {
          expTa.style.height = 'auto';
          expTa.style.height = expTa.scrollHeight + 'px';
        });
        expCol.appendChild(expTa);
        wrap.appendChild(expCol);

        fadeIn(wrap, 150);
        currEl.appendChild(wrap);
        setTimeout(() => emailInp.focus(), 300);
        scrollToBottom();

        const commit = () => {
          const email = emailInp.value.trim();
          const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
          if (!valid) {
            emailErr.style.display = 'block';
            emailInp.focus();
            return;
          }
          emailErr.style.display = 'none';
          formData['email'] = email;
          const exp = expTa.value.trim();
          if (exp) formData['expectations'] = exp;

          const done = document.createElement('div');
          done.className = 'celtx-block';
          done.appendChild(makeYouLabel(false));
          const addLine = (text) => {
            const s = document.createElement('span');
            s.className = 'celtx-dial celtx-dial-user';
            s.textContent = text;
            done.appendChild(s);
          };
          addLine("I don't know. I have a strange feeling someone will reach out and listen to me.");
          done.appendChild(makeEditableLine(email, 'email', "They'll reach me at: ("));
          const cp = document.createElement('span');
          cp.className = 'celtx-dial celtx-dial-user';
          cp.textContent = ')';
          done.appendChild(cp);
          if (exp) done.appendChild(makeEditableLine(exp, 'expectations', "They'll help me by: "));

          histEl.appendChild(done);
          currEl.innerHTML = '';
          showSubmitStep();
        };

        emailInp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); expTa.focus(); }
        });
        expTa.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        });
        // Also commit if email is filled and user presses Enter twice (skipping expectations)
        emailInp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); expTa.value ? commit() : expTa.focus(); }
        });
      }

      // ── STEP 4: Submit ────────────────────────────────
      function showSubmitStep() {
        currEl.innerHTML = '';

        const resonaBlock = makeResonaBlock('Something shifted. Are you sure you are ready?');
        fadeIn(resonaBlock, 150);
        currEl.appendChild(resonaBlock);
        scrollToBottom();

        setTimeout(() => {
          const youWrap = document.createElement('div');
          youWrap.className = 'celtx-block';
          youWrap.appendChild(makeYouLabel(false));

          const sendCol = document.createElement('div');
          sendCol.className = 'celtx-send-col';
          const btn = document.createElement('button');
          btn.className = 'button button-primary';
          btn.type = 'button';
          btn.textContent = 'I am.';
          sendCol.appendChild(btn);
          youWrap.appendChild(sendCol);

          fadeIn(youWrap, 0);
          currEl.appendChild(youWrap);
          scrollToBottom();

          btn.addEventListener('click', () => submitForm(btn));
        }, 700);
      }

      // ── Formspree submit + BLACKOUT ───────────────────
      async function submitForm(btn) {
        btn.disabled    = true;
        btn.textContent = '...';

        const fd = new FormData();
        Object.entries(formData).forEach(([k, v]) => fd.append(k, v));
        fd.append('_subject', 'New conversation — Resonant XP');

        try {
          const res = await fetch('https://formspree.io/f/xdaynqov', {
            method: 'POST', body: fd,
            headers: { Accept: 'application/json' }
          });

          if (res.ok) {
            histEl.style.transition = 'opacity 0.6s ease';
            histEl.style.opacity = '0';
            currEl.style.transition = 'opacity 0.6s ease';
            currEl.style.opacity = '0';
            if (footEl) footEl.style.opacity = '0';
            envEl.style.backgroundColor = '#000';

            setTimeout(() => {
              histEl.innerHTML = '';
              currEl.innerHTML = '';
              histEl.style.opacity = '1';
              currEl.style.opacity = '1';

              const end = document.createElement('span');
              end.className = 'celtx-sd';
              end.style.color     = '#ffffff';
              end.style.marginTop = '3em';
              end.style.opacity   = '0';
              end.style.transition = 'opacity 0.9s ease';
              end.textContent = '(End of scene one.)';
              currEl.appendChild(end);
              requestAnimationFrame(() => requestAnimationFrame(() => { end.style.opacity = '1'; }));
            }, 1400);

          } else {
            btn.disabled    = false;
            btn.textContent = 'I am.';
          }
        } catch {
          btn.disabled    = false;
          btn.textContent = 'I am.';
        }
      }

    })();
    </script>

  </main>
