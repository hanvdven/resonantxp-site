<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonant XP | Not found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Martel+Sans:wght@300;400;600;800&display=swap" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <script src="/header.js" defer></script>
  <style>
    .not-found {
      height: calc(100vh - var(--header-h, 80px));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 2rem;
      margin-top: var(--header-h, 80px);
    }
    .not-found-num {
      font-family: 'Averia Serif Libre', Georgia, serif;
      font-style: italic;
      font-size: clamp(8rem, 28vw, 26rem);
      color: #2563eb;
      line-height: 0.85;
      margin: 0;
      display: block;
      user-select: none;
    }
    .not-found-sub {
      font-family: 'Martel Sans', system-ui, sans-serif;
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: #94a3b8;
      margin: 1.8rem 0 0;
    }

    /* Track header height */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="not-found">
      <span class="not-found-num">404</span>
      <p class="not-found-sub">you're not supposed to be here</p>
    </div>
  </main>

  <script>
    const headerEl = document.getElementById('site-header');
    if (headerEl) {
      const setH = () =>
        document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
      setH();
      new ResizeObserver(setH).observe(headerEl);
    }
  </script>
</body>
</html>
